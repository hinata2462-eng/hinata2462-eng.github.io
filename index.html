<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PILOT">
<meta name="theme-color" content="#0e1830">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%230e1830'/%3E%3Cpath d='M36 96 L146 46 L98 146 L84 104 Z' fill='white'/%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' fill='%230e1830'/%3E%3Cpath d='M36 96 L146 46 L98 146 L84 104 Z' fill='white'/%3E%3C/svg%3E">
<title>PILOT</title>
<style>
:root{
  --navy:#0e1830; --navy2:#16223f; --ink:#16181d; --muted:#6c7280; --line:#e7e8ec;
  --bg:#f5f6f8; --card:#ffffff;
  --blue:#2563eb; --blue-d:#1d4ed8;   /* 進行中 */
  --amber:#c98414; --amber-bg:#fdf3e2; /* 待ち */
  --red:#d23b3b; --red-bg:#fdecec;     /* 注意 */
  --green:#1f8a5b; --green-bg:#e8f5ee; /* 完了 */
  --gray:#8a8f98; --gray-bg:#eef0f2;   /* 保留 */
  --shadow:0 1px 2px rgba(16,24,48,.04),0 10px 26px rgba(16,24,48,.07);
  --r:20px; --nav-h:64px; --safe-b:env(safe-area-inset-bottom,0px); --safe-t:env(safe-area-inset-top,0px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic UI",Meiryo,system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;}
body{max-width:560px;margin:0 auto;min-height:100dvh;position:relative;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
input,textarea,select{font-family:inherit;font-size:16px;}
:focus{outline:none;}
.hidden{display:none!important;}

/* ===== Header ===== */
header{position:sticky;top:0;z-index:40;background:var(--navy);color:#fff;
  padding:calc(var(--safe-t) + 12px) 16px 12px;
  border-bottom-left-radius:20px;border-bottom-right-radius:20px;
  display:flex;align-items:center;justify-content:space-between;gap:10px;}
.brand{display:flex;align-items:center;gap:9px;}
.logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#3b6fe0,#1f3f8f);
  display:flex;align-items:center;justify-content:center;font-size:18px;flex:none;box-shadow:0 3px 10px rgba(40,80,200,.4);}
.brand .nm{font-size:18px;font-weight:800;letter-spacing:1px;}
.brand .tg{font-size:10.5px;color:#aeb8d4;margin-top:1px;letter-spacing:.3px;}
.hdr-right{display:flex;align-items:center;gap:8px;}
.mode-chip{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.12);
  border-radius:20px;padding:7px 12px 7px 11px;font-size:12.5px;font-weight:700;}
.mode-chip .dot{width:8px;height:8px;border-radius:50%;background:#5bd49a;}
.mode-chip.busy .dot{background:#ffb84d;} .mode-chip.out .dot{background:#5aa9ff;}
.mode-chip.focus .dot{background:#b58dff;} .mode-chip.tired .dot{background:#ff8f8f;}
.mode-chip.off .dot{background:#9aa0ab;}
.gear-btn{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;font-size:18px;flex:none;}

/* ===== Main ===== */
main{padding:12px 13px calc(var(--nav-h) + var(--safe-b) + 24px);min-height:60vh;}
.view{display:none;animation:fade .25s;}
.view.on{display:block;}
@keyframes fade{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}

.sec{font-size:13.5px;font-weight:800;margin:22px 3px 11px;display:flex;align-items:center;gap:8px;color:#3a3f49;}
.sec .bar{width:4px;height:15px;border-radius:3px;background:var(--navy);flex:none;}
.sec .ct{font-weight:700;color:var(--muted);font-size:12px;margin-left:auto;}
.sec:first-child{margin-top:6px;}
.sec .lk{margin-left:auto;font-size:12px;font-weight:800;color:var(--blue-d);}

.greet{font-size:13px;color:var(--muted);margin:2px 3px 0;}
.greet b{color:var(--ink);}

/* ===== Hero ===== */
.hero{background:linear-gradient(160deg,#16223f,#0e1830);color:#fff;border-radius:24px;
  padding:18px 17px 16px;box-shadow:0 14px 34px rgba(14,24,48,.28);position:relative;overflow:hidden;}
.hero::after{content:"";position:absolute;right:-40px;top:-40px;width:150px;height:150px;border-radius:50%;
  background:radial-gradient(circle,rgba(90,140,255,.25),transparent 70%);}
.hero .lab{font-size:11.5px;font-weight:800;letter-spacing:1.5px;color:#8fa6e6;display:flex;align-items:center;gap:7px;}
.hero .lab .ws{background:rgba(255,255,255,.14);color:#cdd8f5;border-radius:7px;padding:2px 8px;letter-spacing:.4px;}
.hero .ttl{font-size:22px;font-weight:800;line-height:1.4;margin:11px 0 0;}
.hero .meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:13px;}
.hero .pill{background:rgba(255,255,255,.13);border-radius:9px;padding:6px 11px;font-size:12.5px;font-weight:700;display:flex;align-items:center;gap:5px;}
.hero .pill.due{background:rgba(210,90,90,.32);}
.hero .why{font-size:13px;color:#c4cfe9;margin-top:13px;line-height:1.6;display:flex;gap:7px;}
.hero .acts{display:flex;gap:9px;margin-top:16px;}
.hero .acts button{flex:1;padding:14px;border-radius:14px;font-size:15.5px;font-weight:800;}
.hero .start{background:#fff;color:var(--navy);flex:1.6!important;}
.hero .alt{background:rgba(255,255,255,.13);color:#fff;}
.hero .done{background:rgba(95,212,154,.22);color:#bff3d6;}
.hero .acts button:active{transform:scale(.97);}
.hero-empty{background:linear-gradient(160deg,#1c8a5b,#147047);}

/* ===== card / row ===== */
.card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);border:1px solid var(--line);}
.mini{display:flex;align-items:center;gap:12px;background:var(--card);border-radius:15px;box-shadow:var(--shadow);
  padding:12px 13px;margin-bottom:9px;border:1px solid var(--line);border-left-width:5px;transition:opacity .3s,transform .15s;}
.mini:active{transform:scale(.992);}
.mini.r-sankou{border-left-color:#2f8f6a;} .mini.r-reiki{border-left-color:#b8902a;}
.mini.r-olive{border-left-color:#5a8f3a;} .mini.r-private{border-left-color:#5a78d6;}
.mini.r-none{border-left-color:var(--gray);}
.chk{flex:none;width:38px;height:38px;border-radius:50%;border:2.5px solid #cdd0d6;background:#fff;
  display:flex;align-items:center;justify-content:center;font-size:19px;color:transparent;transition:.15s;}
.chk:active{transform:scale(.86);}
.mini.done{opacity:.45;}
.mini.done .chk{background:var(--green);border-color:var(--green);color:#fff;}
.mini.done .m-ttl{text-decoration:line-through;}
.mini.hold-row{opacity:.7;}
.m-body{flex:1;min-width:0;}
.m-ttl{font-size:15px;font-weight:700;line-height:1.45;}
.m-sub{font-size:12px;color:var(--muted);margin-top:4px;display:flex;gap:7px;flex-wrap:wrap;align-items:center;}
.m-sub .ws{font-weight:800;}
.ws-sankou{color:#2f8f6a;} .ws-reiki{color:#a07c1d;} .ws-olive{color:#52822f;} .ws-private{color:#4a68c8;} .ws-none{color:var(--gray);}
.m-edit{flex:none;color:#c0c5cd;font-size:18px;padding:4px 2px;}

.ball{display:inline-flex;align-items:center;gap:4px;border-radius:7px;padding:2px 7px;font-size:11px;font-weight:800;}
.ball.self{background:var(--blue);color:#fff;}
.ball.other{background:var(--amber-bg);color:var(--amber);border:1px solid #f1d9a8;}
.ball.team{background:#ece9fb;color:#6b4fd0;border:1px solid #ddd5f5;}
.ball.cond{background:var(--gray-bg);color:#5f6670;border:1px solid #dadde1;}
.ball.unknown{background:var(--red-bg);color:var(--red);border:1px solid #f3c9c9;}

.tag{display:inline-flex;align-items:center;gap:3px;border-radius:6px;padding:2px 7px;font-size:10.5px;font-weight:800;}
.tag.now{background:var(--blue);color:#fff;} .tag.wait{background:var(--amber-bg);color:var(--amber);}
.tag.warn{background:var(--red);color:#fff;} .tag.done{background:var(--green-bg);color:var(--green);}
.tag.hold{background:var(--gray-bg);color:#5f6670;}
.over{background:var(--red);color:#fff;font-size:10.5px;font-weight:800;border-radius:6px;padding:2px 7px;}

.next{font-size:12.5px;color:#3c4654;margin-top:6px;background:#f2f6ff;border-radius:8px;padding:6px 9px;line-height:1.5;border:1px solid #e2ebfd;}
.next b{color:var(--blue-d);}

.tiles{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.tile{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:13px 14px;box-shadow:var(--shadow);display:flex;align-items:center;justify-content:space-between;}
.tile .l{font-size:13px;font-weight:700;color:#414855;}
.tile .n{font-size:21px;font-weight:800;}
.tile.danger .n{color:var(--red);} .tile.warn .n{color:var(--amber);} .tile.ok .n{color:var(--blue);}

.stall{background:var(--card);border:1px solid #f1d4d4;border-left:5px solid var(--red);border-radius:16px;padding:14px;box-shadow:var(--shadow);margin-bottom:11px;}
.stall .h{font-size:15px;font-weight:800;display:flex;align-items:center;gap:7px;}
.stall .sub{font-size:12.5px;color:var(--red);font-weight:700;margin-top:5px;}
.stall .sol{font-size:13px;color:#3c4654;margin-top:9px;line-height:1.6;}
.stall .acts{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}
.stall .acts button{flex:1;min-width:90px;padding:11px 8px;border-radius:11px;font-size:13px;font-weight:800;background:#f3f5f8;border:1px solid var(--line);color:#3a414c;}
.stall .acts button.primary{background:var(--navy);color:#fff;border-color:var(--navy);}
.stall .acts button:active{transform:scale(.97);}

.sched{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:6px 4px;}
.sched .it{display:flex;align-items:center;gap:12px;padding:9px 12px;}
.sched .it+.it{border-top:1px solid #f1f2f4;}
.sched .tm{font-size:13px;font-weight:800;color:var(--navy);width:46px;flex:none;}
.sched .ev{font-size:14px;font-weight:600;}
.sched .free{color:var(--green);font-weight:700;}
.sched .free .tm{color:var(--green);}

.ai-note{background:linear-gradient(160deg,#f3f7ff,#eef3fe);border:1px solid #dde7fb;border-radius:16px;padding:14px 15px;}
.ai-note .h{font-size:12.5px;font-weight:800;color:var(--blue-d);display:flex;align-items:center;gap:7px;margin-bottom:8px;}
.ai-note p{margin:0 0 7px;font-size:13.5px;line-height:1.7;color:#2c3340;display:flex;gap:8px;}
.ai-note p:last-child{margin-bottom:0;}
.ai-note p::before{content:"•";color:var(--blue);font-weight:800;}

/* ===== 預ける ===== */
.deposit-hd{text-align:center;margin:14px 0 6px;}
.deposit-hd .t{font-size:19px;font-weight:800;}
.deposit-hd .s{font-size:13px;color:var(--muted);margin-top:5px;line-height:1.6;}
.miccircle{width:128px;height:128px;border-radius:50%;margin:18px auto 6px;
  background:radial-gradient(circle at 50% 38%,#3b6fe0,#1d3f8f);
  display:flex;align-items:center;justify-content:center;font-size:52px;color:#fff;
  box-shadow:0 16px 40px rgba(40,80,200,.4);position:relative;transition:.2s;}
.miccircle:active{transform:scale(.95);}
.miccircle.rec{background:radial-gradient(circle at 50% 38%,#e85b5b,#bb2e2e);box-shadow:0 0 0 0 rgba(210,60,60,.5);animation:pulse 1.3s infinite;}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(210,60,60,.45)}70%{box-shadow:0 0 0 26px rgba(210,60,60,0)}100%{box-shadow:0 0 0 0 rgba(210,60,60,0)}}
.mic-cap{text-align:center;font-size:13.5px;color:var(--muted);font-weight:700;margin-top:2px;}
.dep-tools{display:flex;gap:9px;margin:18px 0 0;}
.dep-tools button{flex:1;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 6px;
  font-size:13px;font-weight:800;color:#3a414c;box-shadow:var(--shadow);display:flex;flex-direction:column;align-items:center;gap:6px;}
.dep-tools button .ic{font-size:22px;}
.dep-tools button:active{transform:scale(.97);}
.dep-area{margin-top:14px;}
.dep-area textarea{width:100%;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;min-height:96px;resize:none;line-height:1.7;box-shadow:var(--shadow);color:var(--ink);}
.dep-area textarea::placeholder{color:#aab0b9;}
.big-btn{width:100%;margin-top:11px;padding:16px;border-radius:15px;background:var(--navy);color:#fff;font-size:16px;font-weight:800;box-shadow:0 8px 22px rgba(14,24,48,.22);display:flex;align-items:center;justify-content:center;gap:8px;}
.big-btn:active{transform:scale(.985);}
.dep-eg{font-size:12.5px;color:var(--muted);text-align:center;margin-top:14px;line-height:1.9;}
.dep-eg b{color:#414855;}

/* ===== フォロー ===== */
.ftabs{display:flex;gap:7px;overflow-x:auto;padding:2px 1px 4px;margin:2px -2px 4px;scrollbar-width:none;}
.ftabs::-webkit-scrollbar{display:none;}
.ftab{flex:none;padding:9px 13px;border-radius:11px;font-size:13px;font-weight:800;background:#fff;border:1px solid var(--line);color:#5a616c;white-space:nowrap;box-shadow:var(--shadow);}
.ftab.on{background:var(--navy);color:#fff;border-color:var(--navy);}
.ftab .b{display:inline-block;background:var(--red);color:#fff;border-radius:9px;font-size:10.5px;padding:1px 6px;margin-left:5px;}
.ftab.on .b{background:rgba(255,255,255,.28);}

.pgroup{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:14px 15px;margin-bottom:12px;}
.pgroup .ph{display:flex;align-items:center;gap:10px;}
.pgroup .av{width:40px;height:40px;border-radius:50%;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;flex:none;}
.pgroup .pn{font-size:16px;font-weight:800;}
.pgroup .pmeta{font-size:12px;color:var(--muted);margin-top:2px;}
.pgroup ul{list-style:none;margin:11px 0 0;padding:0;}
.pgroup li{display:flex;align-items:center;gap:9px;font-size:13.5px;padding:7px 0;border-top:1px solid #f1f2f4;}
.pgroup li .qs{flex:1;}
.pgroup li.answered{color:#9aa0a8;}
.pgroup li.answered .qs{text-decoration:line-through;}
.pgroup li .qtag{font-size:10px;font-weight:800;border-radius:5px;padding:1px 6px;}
.pgroup li .qtag.no{background:var(--amber-bg);color:var(--amber);}
.pgroup li .qtag.ok{background:var(--green-bg);color:var(--green);}
.pgroup .pacts{display:flex;gap:8px;margin-top:13px;}
.pgroup .pacts button{flex:1;padding:11px 6px;border-radius:11px;font-size:13px;font-weight:800;}
.pgroup .pacts .p1{background:var(--navy);color:#fff;}
.pgroup .pacts .p2{background:#f3f5f8;color:#3a414c;border:1px solid var(--line);}
.pgroup .pacts button:active{transform:scale(.97);}
.phist{margin-top:11px;}
.phist summary{font-size:12.5px;color:var(--muted);font-weight:700;cursor:pointer;}
.phist .hl{font-size:12.5px;color:#5a616c;padding:5px 0 0 4px;line-height:1.6;}

/* ===== 案件 ===== */
.proj{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:15px;margin-bottom:12px;border-top-width:4px;}
.proj.st-ok{border-top-color:var(--blue);} .proj.st-warn{border-top-color:var(--amber);}
.proj.st-stall{border-top-color:var(--red);} .proj.st-done{border-top-color:var(--green);} .proj.st-hold{border-top-color:var(--gray);}
.proj .pj-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
.proj .pj-nm{font-size:17px;font-weight:800;}
.proj .pj-ws{font-size:12px;font-weight:800;margin-top:3px;}
.proj .blocker{background:var(--red-bg);border:1px solid #f3c9c9;border-radius:10px;padding:8px 11px;font-size:12.5px;color:#b23838;font-weight:700;margin-top:11px;display:flex;gap:7px;line-height:1.5;}
.proj .blocker.ok{background:var(--green-bg);border-color:#bce6cf;color:var(--green);}
.proj .pj-row{display:flex;gap:8px;margin-top:11px;flex-wrap:wrap;}
.proj .pj-chip{font-size:12px;background:#f3f5f8;border:1px solid var(--line);border-radius:8px;padding:5px 9px;font-weight:700;color:#46505e;}
.proj .pj-chip b{color:var(--ink);}
.bar-wrap{margin-top:13px;}
.bar-track{height:7px;border-radius:5px;background:#eceef1;overflow:hidden;}
.bar-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,#2f6fe0,#1f8a5b);}
.bar-lab{font-size:11.5px;color:var(--muted);margin-top:5px;display:flex;justify-content:space-between;}
.steps{margin-top:14px;border-top:1px solid #f1f2f4;padding-top:6px;}
.step{display:flex;align-items:center;gap:11px;padding:9px 2px;}
.step+.step{border-top:1px solid #f6f7f8;}
.step.editable{cursor:pointer;}
.step .si{width:24px;height:24px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;}
.step .si.done{background:var(--green);color:#fff;}
.step .si.prog{background:var(--blue);color:#fff;}
.step .si.todo{background:#eceef1;color:#aab0b9;border:1.5px solid #dde0e4;}
.step .sn{flex:1;font-size:14px;font-weight:600;}
.step.is-done .sn{color:#9aa0a8;}
.step .del{color:#c7ccd3;font-size:18px;padding:0 4px;}
.pj-acts{display:flex;gap:8px;margin-top:14px;}
.pj-acts button{flex:1;padding:11px;border-radius:11px;font-size:13px;font-weight:800;background:#f3f5f8;border:1px solid var(--line);color:#3a414c;}
.pj-acts button.primary{background:var(--navy);color:#fff;border-color:var(--navy);}
.addbtn{width:100%;padding:14px;border-radius:14px;background:#fff;border:1px dashed #c3c9d2;color:var(--navy);font-weight:800;box-shadow:var(--shadow);margin-bottom:14px;display:flex;align-items:center;justify-content:center;gap:7px;}
.addbtn:active{transform:scale(.99);}

/* ===== 秘書 ===== */
.chat{padding-bottom:8px;}
.bubble{max-width:85%;padding:12px 14px;border-radius:17px;font-size:14px;line-height:1.65;margin-bottom:11px;white-space:pre-wrap;}
.bubble.ai{background:var(--card);border:1px solid var(--line);box-shadow:var(--shadow);border-bottom-left-radius:5px;}
.bubble.me{background:var(--navy);color:#fff;margin-left:auto;border-bottom-right-radius:5px;}
.bubble.ai b{color:var(--blue-d);}
.bubble.act{background:#eef3fe;border-color:#dbe6fb;}
.chips{display:flex;gap:8px;overflow-x:auto;padding:4px 1px 8px;margin:0 -2px;scrollbar-width:none;}
.chips::-webkit-scrollbar{display:none;}
.chip{flex:none;background:#fff;border:1px solid var(--line);border-radius:20px;padding:9px 14px;font-size:13px;font-weight:700;color:#46505e;box-shadow:var(--shadow);white-space:nowrap;}
.chip:active{transform:scale(.96);}
.chatbar{position:fixed;bottom:calc(var(--nav-h) + var(--safe-b));left:0;right:0;max-width:560px;margin:0 auto;
  background:rgba(245,246,248,.94);backdrop-filter:blur(10px);padding:8px 12px 9px;border-top:1px solid var(--line);display:flex;gap:9px;align-items:center;}
.chatbar input{flex:1;background:#fff;border:1px solid var(--line);border-radius:22px;padding:12px 15px;box-shadow:var(--shadow);}
.chatbar .send{width:46px;height:46px;border-radius:50%;background:var(--navy);color:#fff;font-size:19px;display:flex;align-items:center;justify-content:center;flex:none;}
.chatbar .mic{width:46px;height:46px;border-radius:50%;background:#fff;border:1px solid var(--line);font-size:21px;display:flex;align-items:center;justify-content:center;flex:none;color:#3a414c;}
.chatbar .mic.rec{background:var(--red);color:#fff;border-color:var(--red);}

/* ===== nav ===== */
nav{position:fixed;bottom:0;left:0;right:0;max-width:560px;margin:0 auto;height:calc(var(--nav-h) + var(--safe-b));
  padding-bottom:var(--safe-b);background:rgba(255,255,255,.97);backdrop-filter:blur(12px);
  border-top:1px solid var(--line);display:flex;z-index:35;}
nav button{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:#9aa0ab;font-size:10.5px;font-weight:700;position:relative;}
nav button .ic{font-size:21px;line-height:1;}
nav button.on{color:var(--navy);}
nav button.dep{color:var(--navy);}
nav button.dep .ic{width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,#3b6fe0,#1d3f8f);color:#fff;display:flex;align-items:center;justify-content:center;font-size:25px;margin-top:-22px;box-shadow:0 8px 20px rgba(40,80,200,.4);border:4px solid var(--bg);}
nav button .badge{position:absolute;top:5px;right:50%;transform:translateX(20px);background:var(--red);color:#fff;font-size:9.5px;font-weight:800;border-radius:9px;min-width:16px;height:16px;padding:0 4px;display:flex;align-items:center;justify-content:center;}

/* ===== sheet / modal ===== */
.scrim{position:fixed;inset:0;background:rgba(14,20,40,.5);z-index:60;display:none;align-items:flex-end;justify-content:center;}
.scrim.on{display:flex;animation:fade .2s;}
.sheet{background:#fff;width:100%;max-width:560px;border-radius:24px 24px 0 0;max-height:90dvh;overflow-y:auto;
  padding:8px 16px calc(20px + var(--safe-b));animation:up .26s cubic-bezier(.2,.9,.3,1);}
@keyframes up{from{transform:translateY(40px);opacity:.6}to{transform:none;opacity:1}}
.grab{width:42px;height:5px;border-radius:3px;background:#dadde2;margin:8px auto 12px;}
.sheet h3{font-size:18px;font-weight:800;margin:2px 0 4px;}
.sheet .desc{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:12px;}

.pr{background:#f7f8fa;border:1px solid var(--line);border-radius:14px;padding:5px 4px;margin-bottom:14px;}
.pr .fld{display:flex;align-items:center;gap:10px;padding:11px 12px;}
.pr .fld+.fld{border-top:1px solid #eceef1;}
.pr .fk{font-size:12.5px;color:var(--muted);width:74px;flex:none;font-weight:700;}
.pr .fv{flex:1;font-size:14.5px;font-weight:700;min-width:0;}
.pr .fv input,.pr .fv select{width:100%;background:#fff;border:1px solid var(--line);border-radius:9px;padding:9px 11px;font-weight:700;}
.pr .conf{font-size:10.5px;font-weight:800;border-radius:6px;padding:2px 7px;margin-left:auto;flex:none;}
.pr .conf.lo{background:var(--red-bg);color:var(--red);} .pr .conf.mid{background:var(--amber-bg);color:var(--amber);} .pr .conf.hi{background:var(--green-bg);color:var(--green);}
.multi-note{font-size:13px;font-weight:800;color:var(--navy);background:#eef3fe;border:1px solid #dde7fb;border-radius:11px;padding:10px 13px;margin-bottom:12px;display:flex;gap:8px;align-items:center;}
.sheet-acts{display:flex;gap:10px;margin-top:6px;}
.sheet-acts button{flex:1;padding:15px;border-radius:14px;font-size:15.5px;font-weight:800;}
.sheet-acts .ok{background:var(--navy);color:#fff;}
.sheet-acts .ed{background:#f3f5f8;color:#3a414c;border:1px solid var(--line);}
.sheet-acts button:active{transform:scale(.98);}

.edit-fld{margin-bottom:12px;}
.edit-fld label{font-size:12px;font-weight:700;color:var(--muted);display:block;margin-bottom:5px;}
.edit-fld input,.edit-fld select,.edit-fld textarea{width:100%;background:#fff;border:1px solid var(--line);border-radius:10px;padding:11px 12px;font-weight:600;}
.edit-fld textarea{resize:none;line-height:1.6;}
.edit-row2{display:flex;gap:10px;} .edit-row2>*{flex:1;min-width:0;}
.danger-btn{width:100%;padding:13px;border-radius:12px;background:var(--red-bg);color:var(--red);font-weight:800;border:1px solid #f3c9c9;}

.opt{display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:#f7f8fa;border:1px solid var(--line);border-radius:14px;padding:14px 15px;margin-bottom:9px;font-size:15px;font-weight:700;}
.opt .oi{font-size:21px;}
.opt .od{font-size:12px;color:var(--muted);font-weight:600;margin-top:2px;}
.opt:active{transform:scale(.98);}
.opt.sel{border-color:var(--navy);background:#eef3fe;}
.opt .ob{flex:1;}
.opt .chkbox{width:24px;height:24px;border-radius:7px;border:2px solid #cdd0d6;display:flex;align-items:center;justify-content:center;color:transparent;font-size:15px;flex:none;}
.opt.sel .chkbox{background:var(--navy);border-color:var(--navy);color:#fff;}

/* settings */
.set-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 2px;border-bottom:1px solid #f1f2f4;}
.set-row .sl{font-size:14.5px;font-weight:700;} .set-row .sd{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.5;}
.switch{width:50px;height:30px;border-radius:16px;background:#d4d7dd;position:relative;flex:none;transition:.2s;}
.switch.on{background:var(--green);}
.switch::after{content:"";position:absolute;top:3px;left:3px;width:24px;height:24px;border-radius:50%;background:#fff;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.switch.on::after{left:23px;}
.segbtns{display:flex;gap:6px;flex:none;}
.segbtns button{padding:8px 11px;border-radius:9px;font-size:12.5px;font-weight:700;background:#f3f5f8;border:1px solid var(--line);color:#46505e;}
.segbtns button.on{background:var(--navy);color:#fff;border-color:var(--navy);}
.set-h{font-size:12.5px;font-weight:800;color:var(--muted);margin:18px 2px 4px;letter-spacing:.3px;}
.mem-item{display:flex;align-items:center;gap:9px;padding:11px 0;border-bottom:1px solid #f1f2f4;font-size:13.5px;}
.mem-item .mt{flex:1;line-height:1.5;}
.mem-item button{font-size:12px;font-weight:700;color:#5a616c;padding:6px 9px;border-radius:8px;background:#f3f5f8;border:1px solid var(--line);}

/* ===== V0.5 コックピット：サマリー ===== */
.summary{background:var(--card);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow);padding:14px 15px;margin-top:8px;}
.sum-top{display:flex;gap:14px;align-items:center;}
.ring{position:relative;width:58px;height:58px;flex:none;}
.ring svg{width:58px;height:58px;transform:rotate(-90deg);}
.ring .rb{fill:none;stroke:#eceef1;stroke-width:3.6;}
.ring .rf{fill:none;stroke:var(--green);stroke-width:3.6;stroke-linecap:round;transition:stroke-dasharray .5s;}
.ring .rp{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:14.5px;font-weight:800;color:var(--green);}
.ring .rp small{font-size:9px;margin-top:3px;}
.sum-main{flex:1;min-width:0;}
.sum-date{font-size:12px;color:var(--muted);font-weight:700;display:flex;align-items:center;gap:8px;}
.sum-mode{font-size:11px;font-weight:800;background:#f3f5f8;border:1px solid var(--line);border-radius:9px;padding:3px 8px;color:#46505e;}
.sum-line{font-size:14.5px;font-weight:700;margin-top:4px;}
.sum-line b{font-size:18px;}
.sum-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:7px;}
.schip{font-size:12px;font-weight:800;border-radius:9px;padding:5px 10px;background:#f3f5f8;border:1px solid var(--line);color:#46505e;}
.schip:active{transform:scale(.96);}
.schip.danger{background:var(--red-bg);color:var(--red);border-color:#f3c9c9;}
.schip.warn{background:var(--amber-bg);color:var(--amber);border-color:#f1d9a8;}
.sum-ok{font-size:12px;color:var(--green);font-weight:700;}
.sum-ai{display:block;width:100%;text-align:left;font-size:12.5px;color:#3c4654;background:#f2f6ff;border:1px solid #e2ebfd;border-radius:10px;padding:8px 11px;margin-top:11px;line-height:1.5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* ===== 今日の流れ（統合タイムライン） ===== */
.tl{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:4px 6px;}
.tl-row{display:flex;align-items:center;gap:10px;padding:9px 8px;}
.tl-row+.tl-row{border-top:1px solid #f4f5f7;}
.tl-time{font-size:12.5px;font-weight:800;color:var(--navy);width:44px;flex:none;text-align:right;}
.tl-time.tl-late{color:var(--red);}
.tl-dot{width:9px;height:9px;border-radius:50%;flex:none;}
.tl-ev .tl-dot{background:#c9cdd4;}
.tl-body{flex:1;min-width:0;font-size:14px;font-weight:600;line-height:1.4;}
.tl-sub{font-size:11px;color:var(--muted);margin-top:1px;font-weight:600;}
.tl-chk{flex:none;width:32px;height:32px;border-radius:50%;border:2px solid #cdd0d6;background:#fff;color:transparent;font-size:15px;display:flex;align-items:center;justify-content:center;}
.tl-chk:active{transform:scale(.86);}
.tl-past{opacity:.45;}
.tl-now{display:flex;align-items:center;gap:8px;padding:3px 8px;}
.tl-now .l{flex:1;height:2px;background:var(--red);border-radius:2px;}
.tl-now .t{font-size:10.5px;font-weight:800;color:var(--red);flex:none;}
.tl-del{color:#c7ccd3;font-size:16px;padding:0 4px;flex:none;}
.tl-add{width:100%;text-align:center;color:var(--blue-d);font-weight:800;font-size:12.5px;padding:10px;}

/* ===== 案件ミニ進捗 ===== */
.pmini{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:11px 13px;margin-bottom:8px;}
.pmini:active{transform:scale(.99);}
.pm-top{display:flex;align-items:center;gap:8px;}
.pm-dot{width:9px;height:9px;border-radius:50%;flex:none;}
.pm-nm{flex:1;font-size:14px;font-weight:700;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pm-bar{display:flex;align-items:center;gap:9px;margin-top:8px;}
.pm-bar .bar-track{flex:1;}
.pm-pct{font-size:11.5px;font-weight:800;color:var(--muted);width:38px;text-align:right;flex:none;}

/* ===== 保留折りたたみ・整理バナー ===== */
.hold-details{margin-top:10px;background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:4px 12px;}
.hold-details summary{font-size:13px;font-weight:800;color:#5f6670;padding:9px 2px;cursor:pointer;}
.hold-details[open] summary{border-bottom:1px solid #f1f2f4;margin-bottom:8px;}
.clean-banner{width:100%;margin-top:14px;padding:13px;border-radius:13px;background:#eef3fe;border:1px solid #dde7fb;color:var(--blue-d);font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center;gap:10px;}
.cb-skip{font-size:11.5px;color:var(--muted);text-decoration:underline;font-weight:700;}

/* ===== 予定ページ（月間カレンダー） ===== */
.backbar{display:flex;align-items:center;gap:4px;font-size:13.5px;font-weight:800;color:var(--blue-d);padding:10px 4px 2px;}
.cal-head{display:flex;align-items:center;gap:8px;margin:10px 2px 10px;}
.cal-nav{width:38px;height:38px;border-radius:11px;background:#fff;border:1px solid var(--line);font-size:19px;font-weight:800;color:#46505e;box-shadow:var(--shadow);flex:none;}
.cal-title{font-size:17px;font-weight:800;flex:1;text-align:center;}
.gsync{flex:none;font-size:11.5px;font-weight:800;background:#fff;border:1px solid var(--line);border-radius:10px;padding:9px 10px;color:#46505e;box-shadow:var(--shadow);}
.cal-wd{display:grid;grid-template-columns:repeat(5,1fr);text-align:center;font-size:11px;font-weight:800;color:var(--muted);letter-spacing:0;margin:0 2px 4px;}
.cal-wd{white-space:normal;}

/* ビジネス手帳式：平日5マスを広く、土日は横長の帯 */
.mweek{margin-bottom:6px;}
.mwd-row{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;}
.mcell{min-height:64px;background:var(--card);border:1px solid var(--line);border-radius:9px;padding:3px;display:flex;flex-direction:column;gap:2px;overflow:hidden;align-items:stretch;text-align:left;}
.mcell.blank{background:transparent;border:none;min-height:0;}
.mcell .d{font-size:11.5px;font-weight:800;color:#3a414c;align-self:center;line-height:1;}
.mcell.today{border-color:var(--navy);border-width:2px;}
.mcell.sel{background:var(--navy);}
.mcell.sel .d{color:#fff;}
.mcell.past{opacity:.55;}
.mwe-row{display:grid;grid-template-columns:1fr 1fr;gap:3px;margin-top:3px;}
.wehalf{min-height:30px;background:var(--card);border:1px solid var(--line);border-radius:9px;padding:3px 6px;display:flex;align-items:center;gap:6px;overflow:hidden;}
.wehalf.blank{background:transparent;border:none;min-height:0;}
.wehalf .wed{font-size:10.5px;font-weight:800;flex:none;}
.wehalf.sat{background:#eef4fd;border-color:#d5e2f7;}
.wehalf.sun{background:#fdf0f0;border-color:#f3dcdc;}
.wehalf.sat .wed{color:#4a68c8;} .wehalf.sun .wed{color:#c05050;}
.wehalf.today{border-color:var(--navy);border-width:2px;}
.wehalf.sel{background:var(--navy);} .wehalf.sel .wed{color:#fff;}
.wehalf.past{opacity:.55;}
.wehalf .cal-it{flex:1;min-width:0;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin:0 2px;}
.cal-cell{min-height:64px;background:var(--card);border:1px solid var(--line);border-radius:9px;display:flex;flex-direction:column;align-items:stretch;justify-content:flex-start;padding:3px 2px 3px;gap:2px;position:relative;overflow:hidden;}
.cal-cell.blank{background:transparent;border:none;box-shadow:none;min-height:0;}
.cal-cell .d{font-size:12px;font-weight:700;color:#3a414c;line-height:1;align-self:center;margin-bottom:1px;}
/* お天気カレンダー */
.cal-wx{font-size:17px;line-height:1.15;text-align:center;}
.cal-emo{font-size:10px;line-height:1.2;text-align:center;letter-spacing:-.5px;white-space:nowrap;overflow:hidden;}
.cal-tk{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--red);vertical-align:middle;margin-left:2px;}
.cal-peek{font-size:12px;font-weight:800;color:#46505e;margin:0 2px 8px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:8px 11px;box-shadow:var(--shadow);}

/* 予定ラベル：濃い文字＋薄い背景＋色の縦線（広いマス用に10.5px） */
.cal-it{display:block;font-size:10.5px;line-height:1.5;font-weight:700;border-radius:4px;padding:1px 3px 1px 4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:left;border-left:3px solid;}
.cal-it.ev{background:#eef0f3;color:#3c4654;border-color:#8a91a0;}
.cal-it.g{background:#e7f0fe;color:#1d4ed8;border-color:#3f8af0;}
.cal-it.task{background:#fdecec;color:#b23838;border-color:var(--red);}
.cal-more{font-size:9px;font-weight:800;color:var(--muted);text-align:center;}
.cal-cell.sel .cal-more{color:#dfe6f5;}

/* フラットな箇条書きリスト（Todoist風：罫線区切り・色ドット・右に期限） */
.flat{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:2px 13px;}
.fl-sec{display:flex;align-items:center;gap:7px;font-size:12.5px;font-weight:800;color:#5a616c;padding:11px 2px 7px;border-bottom:1px solid #f1f2f4;}
.fl-sec b{color:var(--muted);}
.fl-sec.red{color:var(--red);} .fl-sec.red b{color:var(--red);}
.fl-act{margin-left:auto;color:var(--red);font-weight:800;font-size:12px;}
.fl-row{display:flex;align-items:center;gap:10px;padding:9px 10px 9px 9px;border-bottom:1px solid #f1f2f4;border-left:4px solid transparent;border-radius:0 10px 10px 0;}
.flat > .fl-row:last-child{border-bottom:none;}

/* ⏰ 全画面アラーム */
.alarm-ov{position:fixed;inset:0;background:rgba(15,23,42,.92);z-index:9999;display:flex;align-items:center;justify-content:center;padding:24px;}
.alarm-ov.hidden{display:none;}
.alarm-box{background:#fff;border-radius:22px;padding:30px 22px 24px;width:100%;max-width:340px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.4);}
.alarm-emo{font-size:56px;line-height:1;animation:almSwing 1s ease-in-out infinite;}
@keyframes almSwing{0%,100%{transform:rotate(-12deg)}50%{transform:rotate(12deg)}}
.alarm-time{font-size:34px;font-weight:900;color:#1c2b46;margin-top:8px;letter-spacing:.02em;}
.alarm-ttl{font-size:17px;font-weight:800;color:#2c3340;margin-top:8px;line-height:1.5;word-break:break-word;}
.alarm-acts{display:flex;gap:10px;margin-top:22px;}
.alarm-acts button{flex:1;border:none;border-radius:14px;padding:15px 8px;font-size:15px;font-weight:800;cursor:pointer;}
.al-snz{background:#eef1f5;color:#2c3340;}
.al-stop{background:var(--red,#d64545);color:#fff;}
.fl-ttl{flex:1;min-width:0;font-size:14.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4;}
.fl-due{flex:none;font-size:12px;font-weight:700;color:var(--muted);text-align:right;}
.fl-due.red{color:var(--red);}

/* そっけないタスク一覧（左=内容・右=期限） */
.trow{display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--line);border-left:4px solid;border-radius:12px;padding:8px 11px;margin-bottom:6px;box-shadow:var(--shadow);}
.chk.sm{width:30px;height:30px;font-size:15px;border-width:2px;}
.t-ttl{flex:1;min-width:0;font-size:14.5px;font-weight:700;line-height:1.35;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.t-due{flex:none;font-size:12px;font-weight:800;color:var(--muted);text-align:right;max-width:92px;}
.t-due.over2{color:var(--red);}
.t-prog{flex:none;font-size:11px;font-weight:800;color:var(--blue-d);}
.t-rep{flex:none;font-size:11px;}
.sum-next{font-size:12.5px;color:#3c4654;font-weight:700;margin-top:10px;background:#f4f6f9;border:1px solid var(--line);border-radius:9px;padding:7px 10px;}
.sum-next-ct{float:right;color:var(--blue-d);font-weight:800;}
.dep-tools button.rec{background:var(--red);color:#fff;border-color:var(--red);}

/* サマリーの見出し（数字を主役に） */
.sum-line2{font-size:16px;font-weight:700;margin-top:8px;color:#2c3340;}
.sum-big{font-size:30px;color:var(--navy);font-weight:800;padding:0 2px;}
.sum-big-ok{font-size:19px;font-weight:800;color:var(--green);}
.sum-done{font-size:12.5px;color:var(--muted);font-weight:700;margin-left:6px;}

/* 週表示（読みやすさ最優先のアジェンダ形式） */
.cal-grid.as-list{display:block;}
.wk-day{background:var(--card);border:1px solid var(--line);border-radius:13px;box-shadow:var(--shadow);padding:9px 12px;margin-bottom:8px;}
.wk-day.wk-sat{background:#f2f7fe;border-color:#d5e2f7;}
.wk-day.wk-sun{background:#fdf3f3;border-color:#f3dcdc;}
.wk-day.today{border-color:var(--navy);border-width:2px;}
.wk-hd{font-size:13px;font-weight:800;color:#3a414c;display:flex;align-items:center;gap:8px;padding-bottom:2px;}
.wk-today{background:var(--navy);color:#fff;font-size:10px;border-radius:6px;padding:1px 6px;}
.wk-ct{margin-left:auto;font-size:11.5px;color:var(--muted);font-weight:700;}
.wk-it{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;padding:4px 6px 4px 8px;border-left:3px solid;border-radius:4px;margin-top:4px;}
.wk-it.ev{border-color:#8a91a0;background:#f4f5f7;} .wk-it.g{border-color:#3f8af0;background:#eef5fe;} .wk-it.task{border-color:var(--red);background:#fdf1f1;}
.wk-tm{font-size:11.5px;font-weight:800;color:#5a616c;width:42px;flex:none;}
.wk-tx{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.wk-none{font-size:12px;color:var(--muted);padding:4px 0 2px 8px;}
.cal-cell.today{border-color:var(--navy);border-width:2px;}
.cal-cell.today .d{color:var(--navy);font-weight:800;}
.cal-cell.sel{background:var(--navy);}
.cal-cell.sel .d{color:#fff;}
.cal-cell.past{opacity:.55;}
.cal-dots{display:flex;gap:3px;flex-wrap:wrap;justify-content:center;max-width:80%;}
.cal-dot{width:6px;height:6px;border-radius:50%;}
.cal-dot.ev{background:#8a91a0;} .cal-dot.task{background:var(--red);} .cal-dot.g{background:#3f8af0;}

  <div class="brand">
    <div class="logo">✈️</div>
    <div>
      <div class="nm">PILOT</div>
      <div class="tg">話すだけ。あとはAI秘書が追いかける。</div>
    </div>

  <div class="hdr-right">
    <button class="mode-chip" id="modeChip" onclick="openMode()"><span class="dot"></span><span id="modeLabel">通常</span></button>
    <button class="gear-btn" onclick="go('sec')">💬</button>
    <button class="gear-btn" onclick="openSearch()">🔍</button>

<main>

<!-- HOME -->

<script>
/* =====================================================================
   PILOT V0.2 — single-file MVP（P0修正版）
   ===================================================================== */
const DB_VERSION = 5;
let TODAY = new Date();                  // ← 端末の現在日時を使用（固定日付を撤去）
function syncToday(){ TODAY = new Date(); }
const $ = s => document.querySelector(s);
const esc = s => (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const escReg = s => String(s).replace(/[.*+?^${}()|[\]\\]/g,'\\$&');

/* ワークスペースは固定ではなく利用者が自由に作成（データ化）。色はパレットから自動割当 */
const PALETTE=['#2f8f6a','#a07c1d','#52822f','#4a68c8','#b5562f','#7a4fd0','#0e8a8a','#c0497a','#5a7a2f','#33608f'];
function wsColor(name){ const w=((DB&&DB.workspaces)||[]).find(x=>x.name===name); return w?w.color:'#8a8f98'; }
function wsNames(){ return ((DB&&DB.workspaces)||[]).map(w=>w.name); }
function wsOptions(sel){ const ns=wsNames().slice(); if(!ns.includes('未分類'))ns.push('未分類'); return ns.map(n=>`<option ${n===sel?'selected':''}>${esc(n)}</option>`).join(''); }

const BALL = {
  self:{label:'自分が動く',cls:'self',icon:'🙋'},
  other:{label:'相手を待つ',cls:'other',icon:'⏳'},
  team:{label:'担当者が対応中',cls:'team',icon:'👥'},
  cond:{label:'条件を待つ',cls:'cond',icon:'📦'},
  unknown:{label:'担当を確認',cls:'unknown',icon:'❓'},
};
const MODES = {
  normal:{label:'通常',cls:'',icon:'🟢',desc:'通常の優先順位で提案します'},
  busy:{label:'忙しい',cls:'busy',icon:'🔥',desc:'重要・緊急だけに絞ります'},
  out:{label:'外出中',cls:'out',icon:'🚶',desc:'電話・音声・短時間作業を優先'},
  focus:{label:'集中',cls:'focus',icon:'🎯',desc:'まとまった作業を1件だけ提示'},
  tired:{label:'疲れ気味',cls:'tired',icon:'😮‍💨',desc:'5〜15分で終わる重要作業だけ'},
  off:{label:'今日は休む',cls:'off',icon:'🌙',desc:'緊急以外の通知を止めます'},
};
const TERMINAL = ['done','archived','hold'];   // ← ホーム/フォローから除外する状態

/* ---------- state ---------- */
let DB = load();
let mode = DB.mode || 'normal';
let curView = 'home';
let followTab = 'today';
let skipToday = new Set();      // 「別の仕事」で今日だけ後回しにしたID
let lastUndo = null;
let notifyTimer = null;

function load(){
  let raw=null; try{ raw=localStorage.getItem('pilot_db'); }catch(e){}
  if(raw){
    try{
      let d=JSON.parse(raw);
      if(!d.version||d.version<DB_VERSION) d=migrate(d);   // ← 初期化せず移行（データを失わない）
      d.onboarded = d.onboarded!==false;
      return ensureSettings(d);
    }catch(e){ try{ localStorage.setItem('pilot_db_corrupt', raw); }catch(_){} }
  }
  return bootstrapDB();   // 新規利用者：オンボーディングへ
}
function migrate(d){
  // 移行前に自動バックアップ（復元できるように）
  try{ localStorage.setItem('pilot_db_premigrate_v'+(d.version||1), JSON.stringify(d)); }catch(e){}
  // ワークスペース未定義なら既存データから復元（固定名に依存しない）
  if(!Array.isArray(d.workspaces)){
    const names=[]; (d.tasks||[]).forEach(t=>{ if(t.ws&&!names.includes(t.ws))names.push(t.ws); });
    (d.projects||[]).forEach(p=>{ if(p.ws&&!names.includes(p.ws))names.push(p.ws); });
    ['三高産業','REIKI','OLIVE','プライベート'].forEach(n=>{ if(!names.includes(n))names.push(n); });
    if(!names.includes('未分類'))names.push('未分類');
    d.workspaces=names.map((n,i)=>({name:n,color:PALETTE[i%PALETTE.length]}));
  }
  (d.schedule||[]).forEach(s=>{ if(!s.date)s.date=dayKey(TODAY); });   // 予定に日付を付与
  d.onboarded = true; d.version=DB_VERSION;
  return d;
}
function bootstrapDB(){
  const workspaces=['仕事','プライベート','未分類'].map((n,i)=>({name:n,color:PALETTE[i%PALETTE.length]}));
  return ensureSettings({version:DB_VERSION,onboarded:false,workspaces,tasks:[],projects:[],schedule:[],memory:[],learned:[],notified:[],mode:'normal',lastOpen:TODAY.toISOString(),lastCleanup:null,chat:[]});
}
function ensureSettings(d){
  d.settings = Object.assign({notify:true, strength:'std', privacy:'name', morningBrief:true, nightReview:true, workStart:'09:00', workEnd:'18:00', aiModel:'claude-opus-4-8', gcalClientId:'', gcalOn:false, alarm:true}, d.settings||{});
  d.memory=d.memory||[]; d.learned=d.learned||[]; d.notified=d.notified||[]; d.chat=(d.chat||[]).filter(m=>!m.typing); d.gcal=d.gcal||[]; d.snoozes=d.snoozes||[];
  if(!d.settings.gcalClientId)d.settings.gcalClientId='476865371452-2agstbtq72rvk0h5stfiok582qou70of.apps.googleusercontent.com';  // 既定＝本人のOAuthクライアント（スマホでID貼り付け不要）
  if(!Array.isArray(d.workspaces)||!d.workspaces.length){ d.workspaces=['仕事','プライベート','未分類'].map((n,i)=>({name:n,color:PALETTE[i%PALETTE.length]})); }
  if(!d.workspaces.some(w=>w.name==='未分類'))d.workspaces.push({name:'未分類',color:'#8a8f98'});
  return d;
}
function save(){
  DB.mode=mode; DB.version=DB_VERSION;
  // 「考え中…」の一時バブルは保存しない（awaiting中に他のsaveが走っても残留させない）
  const out=(DB.chat&&DB.chat.some(m=>m.typing))?Object.assign({},DB,{chat:DB.chat.filter(m=>!m.typing)}):DB;
  localStorage.setItem('pilot_db', JSON.stringify(out));
}

/* ---------- date helpers ---------- */
function dPlus(n){ const d=new Date(TODAY); d.setDate(d.getDate()+n); d.setHours(18,0,0,0); return d.toISOString(); }
function atTime(n,h,m){ const d=new Date(TODAY); d.setDate(d.getDate()+n); d.setHours(h,m||0,0,0); return d.toISOString(); }
function addD(n){ const d=new Date(TODAY); d.setDate(d.getDate()+n); d.setHours(0,0,0,0); return d; }
function daysSince(iso){ if(!iso) return 0; return Math.floor((startOfDay(TODAY)-startOfDay(new Date(iso)))/86400000); }
function startOfDay(d){ const x=new Date(d); x.setHours(0,0,0,0); return x; }
function dayKey(d){ return startOfDay(d||TODAY).toDateString(); }
function statusJa(s){ return {now:'今やる',wait:'待っている',warn:'注意',done:'完了',hold:'保留',archived:'対応不要'}[s]||s; }
function isOverdue(iso){ return iso && new Date(iso) < TODAY; }
function fmtDue(iso){
  if(!iso) return '期限なし';
  const d=new Date(iso), dd=Math.round((startOfDay(d)-startOfDay(TODAY))/86400000);
  const hm=(d.getHours()||d.getMinutes())?` ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`:'';
  let day=dd===0?'今日':dd===1?'明日':dd===-1?'昨日':dd<0?`${-dd}日超過`:dd<7?`${dd}日後`:`${d.getMonth()+1}/${d.getDate()}`;
  return day+hm;
}
const WD=['日','月','火','水','木','金','土'];
function fmtFull(d){ return `${d.getMonth()+1}月${d.getDate()}日(${WD[d.getDay()]})`; }
/* あいまい期限（7月中・月末・月頭）はラベル優先で表示。超過判定は内部の目安日で行う */
function fmtDueT(t){
  if(!t)return '期限なし';
  if(t.dueLabel)return t.dueLabel+(isOverdue(t.due)?'（過ぎています）':'');
  return fmtDue(t.due);
}
function repeatMark(t){
  if(!t.repeat||t.repeat==='none')return '';
  if(t.repeat==='weekly'&&t.repeatDay!=null)return `🔁毎週${WD[t.repeatDay]}`;
  if(t.repeat==='monthly'&&t.repeatDate)return `🔁毎月${t.repeatDate}日`;
  const l={daily:'毎日',weekdays:'平日',weekly:'毎週',monthly:'毎月',monthly25:'毎月25日',monthend:'毎月末',yearly:'毎年'}[t.repeat];
  return l?`🔁${l}`:'';
}
function toLocalInput(iso){ if(!iso) return ''; const d=new Date(iso); const p=n=>String(n).padStart(2,'0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`; }
function fromLocalInput(v){ if(!v)return null; const d=new Date(v); return isNaN(d)?null:d.toISOString(); }

/* =====================================================================
   SEED（実日付基準で相対生成）
   ===================================================================== */
function seed(){
  let id=0; const uid=()=>'t'+(++id);
  const at=(mo,dd,h,m)=>new Date(TODAY.getFullYear(),mo-1,dd,h==null?18:h,m||0,0).toISOString();
  // 本人の実タスク（Todoistから移行）。架空のサンプルは撤去済み
  const tasks=[
    {id:uid(),ws:'未分類',title:'顧客管理から広がるロードマップ',status:'now',ball:'self',due:at(6,4),prio:3,updated:TODAY.toISOString()},
    {id:uid(),ws:'未分類',title:'ファイルとファイルを繋ぐ作り方',status:'now',ball:'self',due:at(6,8),prio:3,updated:TODAY.toISOString()},
    {id:uid(),ws:'未分類',title:'エンタメ明け',status:'now',ball:'self',due:at(6,15,22,0),prio:3,updated:TODAY.toISOString()},
    {id:uid(),ws:'未分類',title:'AIで何が出来る様になるのか？？',status:'now',ball:'self',due:at(6,17),prio:3,updated:TODAY.toISOString()},
    {id:uid(),ws:'プライベート',title:'ここのケータイワイモバイル',status:'now',ball:'self',due:at(7,1,8,0),prio:3,updated:TODAY.toISOString()},
    {id:uid(),ws:'プライベート',title:'日赤診察',status:'now',ball:'self',due:at(7,1,10,30),prio:3,updated:TODAY.toISOString()},
    {id:uid(),ws:'プライベート',title:'恵愛堂検査',status:'now',ball:'self',due:at(7,1,20,0),prio:3,updated:TODAY.toISOString()},
    {id:uid(),ws:'プライベート',title:'榛名花火',status:'now',ball:'self',due:at(7,1),prio:3,updated:TODAY.toISOString()},
  ];
  const workspaces=[...['三高産業','REIKI','OLIVE','プライベート'].map((n,i)=>({name:n,color:PALETTE[i%PALETTE.length]})),{name:'未分類',color:'#8a8f98'}];
  return ensureSettings({version:DB_VERSION,onboarded:true,workspaces,tasks,projects:[],schedule:[],memory:[],learned:[],notified:[],mode:'normal',lastOpen:TODAY.toISOString(),lastCleanup:null,chat:[]});
}
function fday(n){ const d=new Date(TODAY); d.setDate(d.getDate()+n); return `${d.getMonth()+1}/${d.getDate()}`; }

/* =====================================================================
   ROUTER
   ===================================================================== */
function go(v){
  syncToday(); curView=v;
  document.querySelectorAll('.view').forEach(x=>x.classList.remove('on'));
  $('#v-'+v).classList.add('on');
  document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('on',b.dataset.v===v));
  $('#chatBar').classList.toggle('hidden',v!=='sec');
  window.scrollTo({top:0,behavior:'instant'});
  if(v==='home')renderHome(); if(v==='follow')renderFollow(); if(v==='proj')renderProjects(); if(v==='sec')renderSecretary();
  if(v==='cal'){ renderCal(); if(gcalConnected()&&Date.now()-(DB.gcalSyncAt||0)>600000)gcalSync(false); }
}
function refreshCur(){ if(curView==='home')renderHome();else if(curView==='follow')renderFollow();else if(curView==='proj')renderProjects(); updateBadges(); }

/* =====================================================================
   状態フィルタ（保留/完了/対応不要を確実に除外）
   ===================================================================== */
function activeTasks(){ return DB.tasks.filter(t=>!TERMINAL.includes(t.status)); }     // hold含めない
function holdTasks(){ return DB.tasks.filter(t=>t.status==='hold'); }
function waitingTasks(){ return DB.tasks.filter(t=>!TERMINAL.includes(t.status) && (t.ball==='other'||t.ball==='team'||t.ball==='cond')); }

/* =====================================================================
   HOME
   ===================================================================== */
function priorityScore(t){
  let s=0; const dd=t.due?(new Date(t.due)-TODAY)/3600000:999;
  if(isOverdue(t.due))s+=30;else if(dd<=3)s+=28;else if(dd<=8)s+=22;else if(dd<=24)s+=15;else if(dd<=72)s+=8;
  s+=(t.prio||0)*5;
  if(t.ball==='self'&&t.next)s+=8;
  if(t.project)s+=6;
  if(mode==='tired'&&t.mins&&t.mins<=15)s+=10;
  if(mode==='out'&&(t.mins<=15||/電話|連絡|返信/.test(t.next||'')))s+=10;
  if(mode==='busy'&&(isOverdue(t.due)||t.prio>=4))s+=8;
  return s;
}
function heroPool(){
  let pool=activeTasks().filter(t=>t.ball==='self'&&t.status==='now'&&!skipToday.has(t.id));
  if(mode==='tired')pool=pool.filter(t=>!t.mins||t.mins<=15);
  if(mode==='out')pool=pool.filter(t=>!t.mins||t.mins<=15||/電話|連絡|返信/.test(t.next||''));
  if(!pool.length)pool=activeTasks().filter(t=>t.ball==='self'&&t.status==='now'&&!skipToday.has(t.id));
  pool.sort((a,b)=>priorityScore(b)-priorityScore(a));
  return pool;
}
function pickHero(){ const p=heroPool(); return p[0]||null; }
function nextHero(){
  // 「別の仕事」: 現在のヒーローを今日だけ後回しにし次点を出す
  const h=pickHero(); if(h) skipToday.add(h.id);
  if(!heroPool().length){ skipToday.clear(); toast('ほかに今やる仕事はありません'); }
  renderHome();
}

function renderHome(){
  syncToday();
  DB.projects.forEach(recomputeProject);

  // ---- サマリー（進捗リング＋フォローチップ＋AI一言） ----
  const doneToday=DB.tasks.filter(t=>t.status==='done'&&daysSince(t.updated)===0).length;
  const selfNow=activeTasks().filter(t=>t.ball==='self'&&t.status==='now');
  const totalToday=doneToday+selfNow.length;
  const pct=totalToday?Math.round(doneToday/totalToday*100):0;
  const fa=waitingTasks();
  const overdueN=fa.filter(t=>isOverdue(t.nextCheck||t.due)).length;
  const todayChkN=fa.filter(t=>t.nextCheck&&fmtDue(t.nextCheck).startsWith('今日')&&!isOverdue(t.nextCheck)).length;
  const chips=[];
  if(overdueN)chips.push(`<button class="schip danger" onclick="go('follow');setFollowTab('today')">🔥 催促したほうがいい相手 <b>${overdueN}</b></button>`);
  if(todayChkN)chips.push(`<button class="schip warn" onclick="go('follow');setFollowTab('today')">📞 きょう確認する相手 <b>${todayChkN}</b></button>`);
  if(fa.length)chips.push(`<button class="schip" onclick="go('follow');setFollowTab('waiting')">⏳ 返事まち <b>${fa.length}</b></button>`);
  const hello=TODAY.getHours()<11?'おはようございます':TODAY.getHours()<17?'こんにちは':'こんばんは';
  const headline= totalToday===0?`<span class="sum-big-ok">きょうの仕事はありません 🍵</span>`
    : selfNow.length===0?`<span class="sum-big-ok">ぜんぶ完了！🎉</span>`
    : `きょうは あと <b class="sum-big">${selfNow.length}</b> 件${doneToday?`<span class="sum-done">（${doneToday}件 終わった）</span>`:''}`;
  const nowHM=`${p2(TODAY.getHours())}:${p2(TODAY.getMinutes())}`;
  const evsToday=[];
  (DB.schedule||[]).forEach(s=>{ if(s.date===dayKey(TODAY)&&s.t>nowHM)evsToday.push({t:s.t,ev:s.ev}); });

  const stalledIds=new Set(detectStalls(999).map(s=>s.t.id));

  updateBadges();
}

/* 期限切れをまとめて今日へ（Todoistのリスケジュール相当・取り消し可） */
function reschedOverdue(){
  const targets=activeTasks().filter(t=>t.ball==='self'&&(t.status==='now'||t.status==='warn')&&isOverdue(t.due));
  if(!targets.length)return;
  const snap=targets.map(t=>({id:t.id,due:t.due,dueLabel:t.dueLabel}));
  let nd=new Date(TODAY); nd.setHours(18,0,0,0);
  if(nd<=TODAY){ nd=new Date(TODAY.getTime()+2*3600000); if(nd.getDate()!==TODAY.getDate()){ nd=new Date(TODAY); nd.setHours(23,59,0,0); } }
  targets.forEach(t=>{ t.due=nd.toISOString(); t.dueLabel=null; t.updated=TODAY.toISOString(); });
  save();
  toast(`期限切れ ${targets.length}件を今日に移しました`,()=>{ snap.forEach(s=>{ const t=DB.tasks.find(x=>x.id===s.id); if(t){t.due=s.due;t.dueLabel=s.dueLabel;} }); save(); toast('元に戻しました'); refreshCur(); });
  refreshCur();
}

function detectStalls(max){
  const out=[];
  activeTasks().forEach(t=>{
    let reason=null,kind=null;
    if(t.ball==='unknown'){reason='誰が動く番か決まっていません';kind='unknown';}
    else if(t.ball==='self'&&!t.next){reason='次の行動が決まっていません';kind='nonext';}
    else if(isOverdue(t.due)&&t.ball==='self'){reason=`期限を ${daysSince(t.due)||1}日過ぎています`;kind='overdue';}
    else if((t.deferCount||0)>=3){reason=`${t.deferCount}回延期されています`;kind='defer';}
    else if(t.ball==='self'&&daysSince(t.updated)>=4){reason=`${daysSince(t.updated)}日間更新されていません`;kind='stale';}
    else if((t.ball==='other'||t.ball==='team')&&!t.nextCheck){reason='相手待ちですが次回確認日が未設定';kind='nocheck';}
    if(reason)out.push({t,reason,kind});
  });
  const sw=x=>(x.kind==='unknown'?10:0)+(x.t.prio||0);   // 担当不明は追跡不能なので最優先で見せる
  out.sort((a,b)=>sw(b)-sw(a)||daysSince(b.t.updated)-daysSince(a.t.updated));
  return out.slice(0,max||4);
}
function stallCard({t,reason,kind}){
  // シート内から呼ばれても閉じるよう、状態変更ボタンには closeSheet() を付ける（ホーム直置きでは無害）
  let sol,acts;

    acts=`<button class="primary" onclick="openDeferReasons('${t.id}')">進め方を相談</button><button onclick="setHold('${t.id}');closeSheet()">今週は保留</button>`;
  }else if(kind==='nonext'){ sol=`${esc(t.title)} には次の行動がありません。最初の10分の作業を作りますか？`;
    acts=`<button class="primary" onclick="askNext('${t.id}')">最初の一手を作る</button><button onclick="markNoNeed('${t.id}');closeSheet()">対応不要</button>`;
  }else if(kind==='nocheck'){ sol='相手待ちですが、いつ確認するか決まっていません。次回確認日を入れましょう。';
    acts=`<button class="primary" onclick="openEdit('${t.id}')">確認日を入れる</button><button onclick="markNoNeed('${t.id}');closeSheet()">追跡しない</button>`;
  }else if(kind==='unknown'){ sol='誰が動く番か決まっていません。担当を設定しましょう。';
    acts=`<button class="primary" onclick="openEdit('${t.id}')">担当を設定</button><button onclick="markNoNeed('${t.id}');closeSheet()">対応不要</button>`;
  }else{ const why=t.stallReason?`${esc(t.stallReason)}が原因で`:'';
    sol=t.next?`${why}止まっています。最初の作業「${esc(t.next)}」から進めますか？`:`${why}止まっています。最初の10分の作業に分割しますか？`;
    acts=`<button class="primary" onclick="${t.next?`startTask('${t.id}');closeSheet()`:`applyDefer('${t.id}','big')`}">${t.next?'これから始める':'10分に分割'}</button><button onclick="setHold('${t.id}');closeSheet()">今週は保留</button><button onclick="markNoNeed('${t.id}');closeSheet()">対応不要</button>`;
  }
  return `<div class="stall"><div class="h">⚠️ ${esc(t.title)}<span class="m-sub" style="margin-left:auto">${esc(t.ws)}</span></div>
    <div class="sub">${esc(reason)}</div><div class="sol">${sol}</div><div class="acts">${acts}</div></div>`;
}
function buildAINote(){
  const notes=[]; const fa=waitingTasks();
  const overdueChk=fa.filter(t=>isOverdue(t.nextCheck||t.due));
  const urgent=activeTasks().filter(t=>t.ball==='self'&&t.status==='now'&&(isOverdue(t.due)||(t.due&&fmtDue(t.due).startsWith('今日')&&t.prio>=4)));
  if(mode==='off')notes.push('今日は休む設定です。緊急の1件以外は通知を止めています。');
  if(urgent.length)notes.push(`午前中は ${urgent[0].ws} の期限付き業務（${urgent[0].title}）を最優先にしてください。`);
  const sato=fa.find(t=>/佐藤/.test(t.person||'')&&t.answer==='partial');
  if(sato)notes.push(`佐藤さんへ電話する際、未回答が${(sato.ansNG||[]).length}件あります。フォロー画面でまとめて確認できます。`);
  if(overdueChk.length)notes.push(`${overdueChk[0].person||'相手'}の確認予定時刻を過ぎています。催促文を準備できます。`);
  const reiki=DB.schedule.find(s=>/REIKI/.test(s.ev)); if(reiki&&mode!=='off')notes.push(`REIKIの作業は ${reiki.t} から60分確保できます。`);
  if(!notes.length)notes.push('今のところ急ぎはありません。返事待ちはAIが追跡しています。');
  return notes.slice(0,4);
}

function autoCompleteStep(t){
  if(!t.project)return; const p=DB.projects.find(x=>x.id===t.project); if(!p)return;
  const n=s=>normTitle(s);
  const step=p.steps.find(s=>s.s!=='done'&&(t.title.includes(s.n)||s.n.includes(t.title)||n(t.title).includes(n(s.n))||n(s.n).includes(n(t.title))));
  if(step){ step.s='done'; const nx=p.steps.find(s=>s.s!=='done'); if(nx&&nx.s==='todo')nx.s='prog'; if(nx)p.current=nx.n; }
  p.updated=TODAY.toISOString(); recomputeProject(p);

function nextRepeatDue(t){
  const d=t.due?new Date(t.due):new Date(TODAY);
  switch(t.repeat){
    case 'daily': d.setDate(d.getDate()+1); break;
    case 'weekdays': do{d.setDate(d.getDate()+1);}while(d.getDay()===0||d.getDay()===6); break;
    case 'weekly': d.setDate(d.getDate()+7); if(t.repeatDay!=null){while(d.getDay()!==t.repeatDay)d.setDate(d.getDate()+1);} break;
    case 'monthly':
      if(t.repeatDate){ d.setMonth(d.getMonth()+1,1); d.setDate(Math.min(t.repeatDate,new Date(d.getFullYear(),d.getMonth()+1,0).getDate())); }
      else d.setMonth(d.getMonth()+1);
      break;
    case 'monthly25': d.setMonth(d.getMonth()+1,25); break;
    case 'monthend': d.setMonth(d.getMonth()+2,0); break;
    case 'yearly': d.setFullYear(d.getFullYear()+1); break;
    default: return null;
  }
  return d.toISOString();
}
function completeTask(id){
  const t=DB.tasks.find(x=>x.id===id); if(!t)return; const before=snap(t);
  const origNext=t.next;
  t.status='done'; t.ball='self'; t.next=null; t.prevNext=origNext||null; t.updated=TODAY.toISOString();
  if(t.project)autoCompleteStep(t);                       // 工程とタスクを正式に連動
  let extra='',spawnId=null;
  if(t.repeat&&t.repeat!=='none'){                        // 定期タスクは次回を自動作成
    const nd=nextRepeatDue(t);
    if(nd){ spawnId='t'+Date.now()+'_r'; DB.tasks.push(Object.assign({},before,{id:spawnId,status:'now',ball:'self',next:origNext,due:nd,answer:undefined,follows:undefined,updated:TODAY.toISOString()})); extra=` ／ 次回 ${fmtDue(nd)} に再登録`; }
  }
  t.spawnedNext=spawnId||null;                            // 「戻す」時に次回分も消せるよう記録
  save(); skipToday.delete(id);
  const remaining=activeTasks().filter(x=>x.ball==='self'&&x.status==='now').length;
  // 取り消すと、定期で自動生成した次回分も一緒に消す（重複ゴースト防止）
  toast(`完了：${t.title}${extra}（今日あと${remaining}件）`,()=>{ if(spawnId){const i=DB.tasks.findIndex(x=>x.id===spawnId);if(i>=0)DB.tasks.splice(i,1);} restore(before); toast('元に戻しました'); });
  refreshCur();
}

   CLAUDE API 連携（本物のAI）
   キーは localStorage 'pilot_api_key' に単独保存 = バックアップJSONに含まれない
   オフライン・未設定・エラー時はルール解析へ自動フォールバック
   ===================================================================== */
function getApiKey(){ try{ return localStorage.getItem('pilot_api_key')||''; }catch(e){ return ''; } }
function aiEnabled(){ return !!getApiKey() && navigator.onLine!==false; }

  const v=($('#apiKeyInput').value||'').trim();
  if(!v){ toast('APIキーを入力してください'); return; }

  openSettings(); toast('APIキーを保存しました（この端末のみ・バックアップ対象外）');
}
function clearApiKey(){ try{ localStorage.removeItem('pilot_api_key'); }catch(e){} openSettings(); toast('APIキーを削除しました'); }

async function aiCall(body){
  const key=getApiKey(); if(!key){ const e=new Error('APIキー未設定'); e.code='no-key'; throw e; }
  const ctrl=new AbortController(); const tm=setTimeout(()=>ctrl.abort(),90000);
  let res;
  try{
    res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'x-api-key':key,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true',  // ブラウザ直呼びに必須のCORSオプトイン
        'content-type':'application/json'
      },
      body:JSON.stringify(body),
      signal:ctrl.signal
    });
  }catch(e){ clearTimeout(tm); if(e.name==='AbortError'){const x=new Error('タイムアウト');x.code='timeout';throw x;} const x=new Error('通信エラー（オフライン？）');x.code='net';throw x; }
  clearTimeout(tm);
  if(!res.ok){
    let msg='HTTP '+res.status;
    try{ const j=await res.json(); if(j.error&&j.error.message)msg=j.error.message; }catch(_){}
    const e=new Error(msg); e.status=res.status; throw e;
  }
  return res.json();
}
function aiText(resp){ const b=(resp.content||[]).find(x=>x.type==='text'); return b?b.text:''; }
function aiErrMsg(e){
  if(e.status===401)return 'APIキーが無効です';
  if(e.status===429)return '利用上限に到達（少し待って再試行）';
  if(e.status===529||e.status>=500)return 'Anthropic側が混雑中';
  if(e.code==='timeout')return 'タイムアウト';
  if(e.code==='net')return 'オフライン';
  return (e.message||'エラー').slice(0,60);
}

function aiSystemForParse(){

- 「金曜までに返事がなければ電話」型は2件に分ける：送る作業(self)＋返事の確認(other, nextCheck=その日時, next="返事がなければ電話する")。
- due/nextCheckは "YYYY-MM-DDTHH:mm" のローカル時刻。時刻の指定がなければ18:00。「午前中」=12:00、「朝」=9:00、「夕方」=17:00、「夜」=19:00。日付が読み取れなければnull。

- nextは次にやる具体的な一手を短く。minsは「30分で」など所要時間を明言したときだけ数値、それ以外はnull。prioは1〜5（5=顧客・納期・金銭に関わる）。`;

async function aiParse(raw){
  const resp=await aiCall({
    model:aiModel(), max_tokens:3000,
    system:aiSystemForParse(),
    messages:[{role:'user',content:raw}],
    output_config:{format:{type:'json_schema',schema:TASKS_SCHEMA}}
  });
  return aiMapTasks(JSON.parse(aiText(resp)), raw);
}
function aiMapTasks(data, raw){
  return (data.tasks||[]).map(t=>{
    const due=t.due?fromLocalInput(t.due):null;
    let nextCheck=t.nextCheck?fromLocalInput(t.nextCheck):null;
    const ws=wsNames().includes(t.ws)?t.ws:'未分類';
    const ball=BALL[t.ball]?t.ball:'self';
    if(ball!=='self'&&!nextCheck)nextCheck=due||dPlus(2);
    const title=(t.title||'').slice(0,40)||(raw||'').slice(0,20);
    const dup=findDuplicate(title,t.person||null);
    return {title,ws,person:t.person||null,ball,
      status:ball==='self'?'now':'wait',
      due,dueLabel:t.dueLabel||null,
      nextCheck:ball==='self'?(t.nextCheck?fromLocalInput(t.nextCheck):null):nextCheck,
      next:t.next||null,
      repeat:REPEAT_OPTS.some(r=>r[0]===t.repeat)?t.repeat:'none',
      repeatDay:(t.repeatDay!=null&&t.repeatDay>=0&&t.repeatDay<=6)?t.repeatDay:null,
      repeatDate:(t.repeatDate&&t.repeatDate>=1&&t.repeatDate<=31)?t.repeatDate:null,
      mins:t.mins||null,prio:Math.min(5,Math.max(1,t.prio||3)),
      conf:{ws:'hi',person:t.person?'hi':'lo',due:due?'hi':'lo',ball:'hi'},
      dup:dup?dup.title:null};
  });
}

function applyAIActions(actions){

const WEEK={'日':0,'月':1,'火':2,'水':3,'木':4,'金':5,'土':6};

function jnum(s){ if(s==null)return null; if(/^\d+$/.test(s))return +s; if(s in KN)return KN[s];

  let mon = prefix==='今週'? addD(-(((cur+6)%7))) : prefix==='再来週'? addD(toNextMon+7) : addD(toNextMon);

function detectRepeat(s){
  if(/平日(毎日|だけ|のみ|の朝)?/.test(s))return 'weekdays';
  if(/毎日/.test(s))return 'daily';
  if(/毎月25日|毎月二十五日/.test(s))return 'monthly25';
  if(/毎月末|月末ごと|毎月\s*末/.test(s))return 'monthend';
  if(/毎週/.test(s))return 'weekly';
  if(/毎月/.test(s))return 'monthly';
  if(/毎年/.test(s))return 'yearly';
  return 'none';
}
function normTitle(s){ return (s||'').replace(/[\s、。・をのにへはがと「」『』]/g,''); }
function gram3(s){ const a=[]; for(let i=0;i<=s.length-3;i++)a.push(s.slice(i,i+3)); return a.length?a:[s]; }
function findDuplicate(title,person){
  const nt=normTitle(title); if(nt.length<3)return null;
  return DB.tasks.find(t=>{
    if(TERMINAL.includes(t.status)||!t.title)return false;
    const ot=normTitle(t.title); if(!ot)return false;
    if(ot===nt)return true;
    // 一方が他方を内包（「○○社へ在庫回答」と「○○社へ在庫回答する」など）
    const sh=nt.length<=ot.length?nt:ot, lo=nt.length<=ot.length?ot:nt;
    if(sh.length>=5&&lo.includes(sh))return true;
    if(person&&t.person&&(t.person.includes(person)||person.includes(t.person))&&gram3(nt).some(g=>ot.includes(g)))return true;
    return false;
  });
}
function analyzeOne(chunk,full,solo){
  let ws=detectWS(chunk); if(ws==='未分類'&&solo)ws=detectWS(full);
  const person=detectPerson(chunk)||(solo?detectPerson(full):null);
  let wsConf=detectWS(chunk)!=='未分類'?'hi':(ws!=='未分類'?'mid':'lo');
  // 学習の反映：キーワードで決まらないとき、相手→所属の記憶を使う（使うほど精度が上がる）
  if(ws==='未分類'){ const lws=learnedWS(person); if(lws){ ws=lws; wsConf='hi'; } }
  const ball=detectBall(chunk);
  const dx=detectDueEx(chunk); const rep=detectRepeatEx(chunk);
  let due=dx.due, dueLabel=dx.label;
  if(!due&&rep.repeat!=='none'){ due=nextOccur(rep); }          // 「毎週月曜に◯◯」→次の月曜を初期期限に
  const next=detectNext(chunk,ball);
  const nextCheck=(ball==='other'||ball==='team'||ball==='cond')?(parseFollowup(chunk)||due||dPlus(2)):null;
  const title=cleanTitle(chunk);
  const dup=findDuplicate(title,person);
  const conf={ws:wsConf,person:person?'hi':'lo',due:due?'hi':'lo',ball:'hi'};
  return {title,ws,person,ball,status:ball==='self'?'now':'wait',due,dueLabel,nextCheck,next,
    repeat:rep.repeat,repeatDay:rep.repeatDay!=null?rep.repeatDay:null,repeatDate:rep.repeatDate||null,
    mins:estMins(chunk),prio:estPrio(chunk,due),conf,dup:dup?dup.title:null};
}
/* 所要時間は自動推定しない。「30分で」など明示されたときだけ拾う（時刻の「10時30分」は除外） */
function estMins(s){
  const re=/(\d{1,3})\s*分/g; let m;
  while((m=re.exec(s))!==null){
    const before=s.slice(Math.max(0,m.index-4),m.index);
    if(/時\s*$/.test(before))continue;          // 「◯時30分」の分は時刻
    return +m[1];
  }
  if(/(\d{1,2})\s*時間/.test(s))return +RegExp.$1*60;
  return null;
}
function estPrio(s,due){ let p=3; if(/配送|入金|納品|至急|急ぎ|なるべく早く|顧客|お客/.test(s))p=5; else if(isOverdue(due))p=4; else if(/家族|私用/.test(s))p=2; return p; }

function ruleParse(raw){

  let tasks=[]; chunks.forEach(c=>{tasks=tasks.concat(expand(c,raw,solo));});
  return tasks;
}

function learnFrom(p){

  const t=DB.tasks.find(x=>x.id===id); const ng=t.ansNG||[]; const done=[];

function resolveReply(id,kind){
  const t=DB.tasks.find(x=>x.id===id); if(!t)return; t.updated=TODAY.toISOString();
  (t.follows=t.follows||[]).push(`${fday(0)} 回答受領（${kind==='full'?'全部':kind==='partial'?'一部':'不要'}）`);
  if(kind==='full'){ t.answer='answered'; if(t.next){t.ball='self';t.status='now';toast('回答を受け、あなたの番に戻しました');}else{t.status='done';toast('完了にしました');} }
  else if(kind==='partial'){ t.answer='partial'; if(!t.ansNG)t.ansNG=[t.title]; toast('一部回答として待ち継続にしました'); }
  else { t.status='archived'; t.noNeed=true; t.ball='self'; toast('対応不要として整理しました'); }
  save(); closeSheet(); refreshCur();
}

function recomputeProject(p){
  const tot=p.steps.length||1; const done=p.steps.filter(s=>s.s==='done').length;
  p.progress=Math.round(done/tot*100);
  if(p.progress===100)p.state='done';
  else if(p.blocker){ p.state= daysSince(p.updated)>=5?'stall':'warn'; }
  else if(daysSince(p.updated)>=7)p.state='stall';
  else if(isOverdue(p.due))p.state='warn';
  else p.state='ok';
  return p;
}
function syncProjectFromTasks(pid){ const p=DB.projects.find(x=>x.id===pid); if(p)recomputeProject(p); }
const PJ_STATE={ok:{l:'順調',c:'tag now'},warn:{l:'注意',c:'tag wait'},stall:{l:'停滞',c:'tag warn'},done:{l:'完了',c:'tag done'},hold:{l:'保留',c:'tag hold'}};

  $('#projList').innerHTML=`<button class="addbtn" onclick="newProject()">＋ 新規案件を作る</button>`+DB.projects.map(projCard).join('');

function projCard(p){
  const ps=PJ_STATE[p.state]||PJ_STATE.ok;
  const steps=p.steps.map((s,idx)=>{const cls=s.s,ic=s.s==='done'?'✓':s.s==='prog'?'●':'○';
    return `<div class="step editable ${s.s==='done'?'is-done':''}" onclick="cycleStep('${p.id}',${idx})">
      <span class="si ${cls}">${ic}</span><span class="sn">${esc(s.n)}</span>
      <span class="del" onclick="event.stopPropagation();delStep('${p.id}',${idx})">×</span></div>`;}).join('');
  return `<div class="proj st-${p.state}" style="border-top-color:${wsColor(p.ws)}">
    <div class="pj-top"><div><div class="pj-nm">${esc(p.name)}</div><div class="pj-ws" style="color:${wsColor(p.ws)}">${esc(p.ws)}</div></div><span class="${ps.c}">${ps.l}</span></div>
    ${p.blocker?`<div class="blocker">🚧 完了を妨げている項目：${esc(p.blocker)}</div>`:`<div class="blocker ok">✓ 現在ブロックしている項目はありません</div>`}
    <div class="pj-row"><span class="pj-chip">現在の工程 <b>${esc(p.current||'-')}</b></span><span class="pj-chip">次にやること <b>${esc(p.next||'-')}</b></span><span class="pj-chip">期限 <b>${fmtDue(p.due)}</b></span></div>
    <div class="steps">${steps||'<div class="empty" style="padding:14px">工程がありません。下のボタンで追加できます。</div>'}</div>

function drawChat(){ $('#chatLog').innerHTML=DB.chat.map(m=>`<div class="bubble ${m.r} ${m.act?'act':''}" ${m.typing?'style="opacity:.55;font-style:italic"':''}>${m.r==='ai'?fmtAI(m.t):esc(m.t)}</div>`).join(''); window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'}); }
function fmtAI(t){ return esc(t).replace(/「(.+?)」/g,'<b>「$1」</b>'); }

function chatVoice(){

async function sendChat(){
  const v=$('#chatInput').value.trim(); if(!v)return;
  DB.chat.push({r:'me',t:v}); $('#chatInput').value='';
  if(aiEnabled()){
    DB.chat.push({r:'ai',t:'考え中…',typing:true}); drawChat();
    try{
      const out=await aiChat(v);
      DB.chat=DB.chat.filter(m=>!m.typing);
      const done=applyAIActions(out.actions||[]);
      let msg=out.reply||'';
      if(done.length)msg+=(msg?'\n\n':'')+done.join('\n');
      DB.chat.push({r:'ai',t:msg||'（応答なし）',act:done.length>0});
      save(); drawChat(); if(done.length)refreshCur();
      return;
    }catch(e){
      DB.chat=DB.chat.filter(m=>!m.typing);
      DB.chat.push({r:'ai',t:`（Claude接続に失敗: ${aiErrMsg(e)} → ルール応答に切替）`});
      drawChat();
    }
  }
  const cmd=tryCommand(v);
  if(cmd){ DB.chat.push({r:'ai',t:cmd,act:true}); save(); drawChat(); refreshCur(); return; }
  DB.chat.push({r:'ai',t:answerQuery(v)}); save(); drawChat();
}
function findTasksByText(q){
  const ws=detectWS(q);
  let pool=activeTasks();
  if(ws!=='未分類'&&/三高|REIKI|レイキ|OLIVE|オリーブ|家族|プライベート/i.test(q))pool=pool.filter(t=>t.ws===ws);
  // タイトル語一致
  const words=q.replace(/(今日|明日|来週|全部|を|の|に|へ|は|移して|回して|延期|対応不要|返事待ち).*/g,'').trim();
  return {ws,pool};
}
function tryCommand(q){
  // 一括リスケ：「今日のREIKIを全部明日に移して」など
  const wsMatch=/(三高産業|三高|REIKI|レイキ|OLIVE|オリーブ|プライベート|家族)/i.exec(q);
  const parts=q.split(/全部|まとめて|すべて/);                 // 行先は「全部」より後ろから判定
  const head=parts[0]||'', tail=parts[1]||q;
  const moveTo=/(明後日|明日|来週|今日)/.exec(tail);
  if(/(全部|まとめて|すべて)/.test(q)&&/(移し|回し|延期|ずらし)/.test(q)&&moveTo){
    const ws=wsMatch?detectWS(wsMatch[0]):null;
    let targets=activeTasks().filter(t=>t.ball==='self');
    if(ws&&ws!=='未分類')targets=targets.filter(t=>t.ws===ws);
    if(/今日/.test(head))targets=targets.filter(t=>t.status==='now');
    if(!targets.length)return `対象になる仕事が見つかりませんでした。`;
    const lbl=moveTo[0], off=/明後日/.test(lbl)?2:/来週/.test(lbl)?7:/今日/.test(lbl)?0:1;
    targets.forEach(t=>{ const nd=addD(off); if(t.due){const o=new Date(t.due);nd.setHours(o.getHours(),o.getMinutes(),0,0);}else nd.setHours(18,0,0,0); t.due=nd.toISOString(); t.dueLabel=null; t.updated=TODAY.toISOString(); });
    save(); return `${ws&&ws!=='未分類'?ws+'の':''}${targets.length}件を${lbl}へ移しました。`;
  }
  // 単体リスケ：「「○○」を来週に回して」
  const qm=q.match(/[「『](.+?)[」』]/);
  if(qm&&/(来週|明日|明後日|今日)/.test(q)&&/(移し|回し|延期|ずらし)/.test(q)){
    const t=activeTasks().find(x=>x.title.includes(qm[1]));
    if(t){ const lbl=/明後日/.test(q)?'明後日':/来週/.test(q)?'来週':/今日/.test(q)?'今日':'明日';
      const off=/明後日/.test(q)?2:/来週/.test(q)?7:/今日/.test(q)?0:1;
      const nd=addD(off);                                  // ← TODAY基準の絶対日付（月またぎ誤りを修正）
      if(t.due){ const o=new Date(t.due); nd.setHours(o.getHours(),o.getMinutes(),0,0); } else nd.setHours(18,0,0,0);
      t.due=nd.toISOString(); t.dueLabel=null; t.updated=TODAY.toISOString(); save();
      return `「${t.title}」を${lbl}（${fmtDue(t.due)}）に移しました。`; }
  }
  // 対応不要
  if(qm&&/(対応不要|やらなくて|不要)/.test(q)){ const t=activeTasks().find(x=>x.title.includes(qm[1])); if(t){t.status='archived';t.noNeed=true;t.updated=TODAY.toISOString();save();return `「${t.title}」を対応不要として整理しました。`;} }
  // 返事待ちにして
  if(qm&&/(返事待ち|相手待ち|待ちに)/.test(q)){ const t=activeTasks().find(x=>x.title.includes(qm[1])); if(t){t.ball='other';t.status='wait';t.nextCheck=t.nextCheck||dPlus(3);t.updated=TODAY.toISOString();save();return `「${t.title}」を相手の返事待ちにしました（3日後に確認）。`;} }
  return null;
}
function answerQuery(q){
  const act=activeTasks();
  if(/三高/.test(q))return listAns('三高産業の仕事',act.filter(t=>t.ws==='三高産業'));
  if(/REIKI|レイキ/i.test(q))return listAns('REIKIの仕事',act.filter(t=>t.ws==='REIKI'));
  if(/OLIVE|オリーブ/i.test(q))return listAns('OLIVEの仕事',act.filter(t=>t.ws==='OLIVE'));
  if(/佐藤/.test(q)){const t=act.find(x=>/佐藤/.test(x.person||''));if(t){const ng=t.ansNG||[t.title];return `佐藤さんへの確認事項は${ng.length}件です。\n`+ng.map((x,i)=>`${i+1}. ${x}`).join('\n')+`\n\nフォロー画面の「確認文を作る」で文面を用意できます。`;}return '佐藤さんへの確認事項は今はありません。';}
  if(/返事|回答|待っている人|待ってる/.test(q)){const w=waitingTasks().filter(t=>t.ball==='other'||t.ball==='team');if(!w.length)return '今、返事待ちの仕事はありません。';return `返事待ちは${w.length}件です。\n`+w.map(t=>`・${t.person||'相手'}：${t.title}（${t.nextCheck?fmtDue(t.nextCheck)+'確認':'確認日未設定'}）`).join('\n')+(w.some(t=>isOverdue(t.nextCheck))?'\n\n⚠️ 確認予定を過ぎている相手がいます。':'');}
  if(/30分|短時間|すぐ|空き時間/.test(q))return listAns('30分以内でできる仕事',act.filter(t=>t.ball==='self'&&t.mins&&t.mins<=30).sort((a,b)=>a.mins-b.mins));
  if(/外出|出先|移動中/.test(q))return listAns('外出中でもできる仕事',act.filter(t=>t.ball==='self'&&(/電話|連絡|返信/.test(t.next||'')||t.mins<=10)));
  if(/止ま|停滞|進んでない/.test(q)){const s=detectStalls();if(!s.length)return '止まっている仕事はありません。順調です。';return `止まっている仕事は${s.length}件です。\n`+s.map(x=>`・${x.t.title}（${x.reason}）`).join('\n')+`\n\nホームの「気になること」から次にやることを作れます。`;}
  if(/今週中.*終わら|間に合/.test(q)){const r=act.filter(t=>t.ball==='self'&&(!t.next||(t.deferCount||0)>=2||daysSince(t.updated)>=5));return r.length?`今週中に終わらない可能性がある仕事：\n`+r.map(t=>`・${t.title}`).join('\n'):'今のところ、今週中に間に合わない懸念のある仕事はありません。';}
  if(/明日.*準備|明日.*教え/.test(q)){const tom=act.filter(t=>t.due&&fmtDue(t.due).startsWith('明日'));return `明日の準備です。\n`+(tom.length?tom.map(t=>`・${t.title}（${t.ws}）`).join('\n'):'明日期限の仕事はありません。')+`\n返事待ちの確認も忘れずに。`;}
  if(/今日.*何|何から|優先|まず/.test(q)){const h=pickHero();if(!h)return '今日、自分が動く仕事は片付いています。返事待ちはAIが追跡中です。';const today=act.filter(t=>t.ball==='self'&&t.status==='now');return `まず「${h.title}」から始めましょう。${h.due?`期限は${fmtDue(h.due)}`:''}${h.reason?'、'+h.reason:''}。\n今日、自分が動く仕事は全部で${today.length}件です。`;}
  const h=pickHero();
  return `ご質問を確認しました。今やるべきは「${h?h.title:'特になし'}」です。\n「返事を待っている人は？」「30分でできる仕事は？」「今日のREIKIを全部明日に移して」などにも対応できます。`;
}
function listAns(label,list){ if(!list.length)return `${label}は今ありません。`; return `${label}は${list.length}件です。\n`+list.slice(0,6).map(t=>`・${t.title}${t.due?'（'+fmtDue(t.due)+'）':''} ${(BALL[t.ball]||BALL.self).icon}`).join('\n'); }

/* 通知ループ（開いている間） */
function startNotifyLoop(){ if(notifyTimer)clearInterval(notifyTimer); notifyTimer=setInterval(notifyTick,60000); notifyTick(); }
function privTitle(t){ return DB.settings.privacy==='hidden'?'確認事項があります':(t.title||'タスク'); }
function fire(title,body){ try{ new Notification(title,{body,tag:title}); }catch(e){} }
function notifyTick(){
  syncToday();
  if(!DB.settings.notify||mode==='off')return;
  if(typeof Notification==='undefined'||Notification.permission!=='granted')return;
  DB.notified=DB.notified||[]; let changed=false;
  const str=DB.settings.strength||'std';
  const mark=k=>{ if(DB.notified.includes(k))return false; DB.notified.push(k); changed=true; return true; };
  // 朝のブリーフィング（標準以上＋トグルON）
  if(str!=='min'&&DB.settings.morningBrief&&TODAY.getHours()>=7&&TODAY.getHours()<11){
    if(mark('brief-'+dayKey())){ const h=pickHero(),w=waitingTasks().length; fire('☀️ 今日のブリーフィング',(h?`最重要：${privTitle(h)} ／ `:'')+`返事待ち${w}件`); }
  }
  // 返事の確認時刻（全強度）
  waitingTasks().forEach(t=>{ const due=t.nextCheck||t.due; if(due&&new Date(due)<=TODAY){ if(mark('chk-'+t.id+'-'+due))fire('🔔 確認の時間です',privTitle(t)+(t.person?`（${t.person}）`:'')); } });
  // 期限超過（標準以上）
  if(str!=='min'){ activeTasks().filter(t=>t.ball==='self'&&isOverdue(t.due)).forEach(t=>{ if(mark('over-'+t.id+'-'+t.due))fire('⚠️ 期限を過ぎています',privTitle(t)); }); }
  // 「しっかり」だけ：期限の事前アラート＋夜の振り返り通知
  if(str==='strong'){
    activeTasks().filter(t=>t.ball==='self'&&t.due&&new Date(t.due)>TODAY&&(new Date(t.due)-TODAY)<=90*60000).forEach(t=>{ if(mark('soon-'+t.id+'-'+t.due))fire('⏰ まもなく期限',privTitle(t)+`（${fmtDue(t.due)}）`); });
    if(DB.settings.nightReview&&TODAY.getHours()>=20){ if(mark('nightN-'+dayKey()))fire('🌙 夜の振り返り','今日の完了確認と、明日へ移す仕事をチェックしましょう'); }
  }
  if(DB.notified.length>240)DB.notified=DB.notified.slice(-140);
  if(changed)save();
}
function nightReviewCheck(){
  if(!DB.settings.nightReview||TODAY.getHours()<20)return;
  DB.notified=DB.notified||[]; const key='nightR-'+dayKey();
  if(DB.notified.includes(key))return; DB.notified.push(key); save();
  const done=DB.tasks.filter(t=>t.status==='done'&&daysSince(t.updated)===0).length;
  const carry=activeTasks().filter(t=>t.ball==='self'&&t.status==='now'&&t.due&&fmtDue(t.due).startsWith('今日')).length;
  const open=waitingTasks().filter(t=>isOverdue(t.nextCheck||t.due)).length;
  setTimeout(()=>openSheet(`<h3>🌙 夜の振り返り</h3><p class="desc">3つだけ確認します。設定でオフにできます。</p>
    <div class="pr"><div class="fld"><span class="fk">今日完了</span><span class="fv">${done}件 — 内容に間違いはありませんか？</span></div>
      <div class="fld"><span class="fk">明日へ</span><span class="fv">未完了 ${carry}件 を明日に移しますか？</span></div>
      <div class="fld"><span class="fk">連絡漏れ</span><span class="fv">返事待ちの確認超過 ${open}件</span></div></div>

}
function nightMoveTomorrow(){
  activeTasks().filter(t=>t.ball==='self'&&t.status==='now'&&t.due&&fmtDue(t.due).startsWith('今日')).forEach(t=>{ const nd=addD(1); const o=new Date(t.due); nd.setHours(o.getHours(),o.getMinutes(),0,0); t.due=nd.toISOString(); t.updated=TODAY.toISOString(); });
