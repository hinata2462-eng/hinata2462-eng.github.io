/* ⏰ アラーム（開いている間）：予定の時刻・タスク期限・確認時刻に音＋全画面表示 */
let audioCtx=null, almBeepT=null, almVibT=null, alarmCur=null;
function ensureAudio(){ try{ const AC=window.AudioContext||window.webkitAudioContext; if(!AC)return; if(!audioCtx)audioCtx=new AC(); if(audioCtx.state==='suspended')audioCtx.resume(); }catch(e){} }
// iPhoneは操作（タップ）後でないと音が出せないため、最初のタップで音の準備をしておく
document.addEventListener('touchend',ensureAudio,{passive:true});
document.addEventListener('click',ensureAudio);
function almBeep(){
  try{
    if(!audioCtx)return; const t=audioCtx.currentTime;
    [[880,0],[660,.28]].forEach(([f,off])=>{
      const o=audioCtx.createOscillator(),g=audioCtx.createGain();
      o.type='sine'; o.frequency.value=f; o.connect(g); g.connect(audioCtx.destination);
      g.gain.setValueAtTime(0.0001,t+off);
      g.gain.exponentialRampToValueAtTime(0.35,t+off+0.03);
      g.gain.exponentialRampToValueAtTime(0.0001,t+off+0.26);
      o.start(t+off); o.stop(t+off+0.3);
    });
  }catch(e){}
}
function startAlarmSound(){
  stopAlarmSound(); ensureAudio();
  almBeep(); almBeepT=setInterval(almBeep,1300);
  if(navigator.vibrate){ const v=()=>{try{navigator.vibrate([350,150,350]);}catch(e){}}; v(); almVibT=setInterval(v,1300); }
}
function stopAlarmSound(){
  if(almBeepT){clearInterval(almBeepT);almBeepT=null;}
  if(almVibT){clearInterval(almVibT);almVibT=null;}
  try{navigator.vibrate&&navigator.vibrate(0);}catch(e){}
}
function showAlarm(title,timeTxt){
  alarmCur={title,timeTxt};
  $('#almTime').textContent=timeTxt; $('#almTtl').textContent=title;
  $('#alarmOv').classList.remove('hidden');
  startAlarmSound();
  if(typeof Notification!=='undefined'&&Notification.permission==='granted')fire('⏰ '+timeTxt,title);
}
function stopAlarm(){ stopAlarmSound(); $('#alarmOv').classList.add('hidden'); alarmCur=null; }
function snoozeAlarm(){
  if(alarmCur){ DB.snoozes=DB.snoozes||[]; DB.snoozes.push({title:alarmCur.title,at:new Date(Date.now()+10*60000).toISOString()}); save(); toast('⏰ 10分後にもう一度鳴らします'); }
  stopAlarm();
}
function testAlarm(){ ensureAudio(); showAlarm('テストです。この音と画面でお知らせします',`${p2(TODAY.getHours())}:${p2(TODAY.getMinutes())}`); }
function alarmTick(){
  if(!DB.settings.alarm||mode==='off')return;
  if(alarmCur)return;                                   // 鳴っている間は重ねない
  syncToday();
  const now=TODAY.getTime(), win=3*60000;               // 時刻を3分過ぎるまでが鳴らす対象（古いものは鳴らさない）
  DB.notified=DB.notified||[]; let changed=false;
  const mark=k=>{ if(DB.notified.includes(k))return false; DB.notified.push(k); changed=true; return true; };
  const hits=[];
  (DB.snoozes||[]).slice().forEach(s=>{ if(new Date(s.at).getTime()<=now){ hits.push({title:s.title,d:new Date(s.at)}); DB.snoozes.splice(DB.snoozes.indexOf(s),1); changed=true; } });
  dayItems(TODAY).forEach(it=>{
    if(it.kind==='task'){
      const t=it.task; if(!t.due||t.dueLabel||t.ball!=='self')return;
      const tm=new Date(t.due).getTime();
      if(tm<=now&&now-tm<win&&mark('alm-t-'+t.id+'-'+t.due))hits.push({title:t.title,d:new Date(t.due)});
    }else{
      if(!/^\d{1,2}:\d{2}$/.test(it.t||''))return;      // 「終日」などは鳴らさない
      const [h,m]=it.t.split(':').map(Number); const d=new Date(TODAY); d.setHours(h,m,0,0);
      if(d.getTime()<=now&&now-d.getTime()<win&&mark('alm-e-'+dayKey()+'-'+it.t+'-'+it.ev))hits.push({title:it.ev,d});
    }
  });
  waitingTasks().forEach(t=>{
    if(!t.nextCheck)return; const tm=new Date(t.nextCheck).getTime();
    if(tm<=now&&now-tm<win&&mark('alm-c-'+t.id+'-'+t.nextCheck))hits.push({title:(t.person?t.person+'に確認：':'確認：')+t.title,d:new Date(t.nextCheck)});
  });
  if(changed)save();
  if(hits.length){ const h=hits[0]; showAlarm(hits.length>1?`${h.title}（ほか${hits.length-1}件）`:h.title,`${p2(h.d.getHours())}:${p2(h.d.getMinutes())}`); }
}

let cleanupQueue=[],cleanupIdx=0;
function cleanupCandidates(){
  return DB.tasks.filter(t=>!TERMINAL.includes(t.status)&&(daysSince(t.updated)>=7||(t.ball==='self'&&!t.next)||(isOverdue(t.due)&&t.ball==='self')||(t.deferCount||0)>=3)).slice(0,10);
}
function snoozeCleanup(){ DB.lastCleanup=TODAY.toISOString(); save(); renderHome(); toast('今週はスキップしました'); }
function weeklyCleanup(){
  const cand=cleanupCandidates();
  if(!cand.length){ DB.lastCleanup=TODAY.toISOString(); save(); openSheet(`<h3>週次クリーンアップ</h3><p class="desc">整理が必要な仕事はありません。きれいな状態です ✨</p><div class="sheet-acts"><button class="ok" onclick="closeSheet();renderHome()">閉じる</button></div>`);return;}
  cleanupQueue=cand;cleanupIdx=0;showCleanup();
}
function showCleanup(){
  if(cleanupIdx>=cleanupQueue.length){DB.lastCleanup=TODAY.toISOString();save();closeSheet();toast('週次クリーンアップ完了');refreshCur();return;}
  const t=cleanupQueue[cleanupIdx];
  openSheet(`<h3>週次クリーンアップ ${cleanupIdx+1}/${cleanupQueue.length}</h3>
    <p class="desc">この仕事は ${daysSince(t.updated)}日間動いていません。今の状態はどれですか？</p>
    <div class="pr"><div class="fld"><span class="fk">仕事</span><span class="fv">${esc(t.title)}（${esc(t.ws)}）</span></div></div>
    <button class="opt" onclick="cleanupDo('keep')"><span class="oi">📌</span><span class="ob">まだ必要</span></button>
    <button class="opt" onclick="cleanupDo('wait')"><span class="oi">⏳</span><span class="ob">相手を待っている</span></button>
    <button class="opt" onclick="cleanupDo('hold')"><span class="oi">⏸</span><span class="ob">今は保留</span></button>
    <button class="opt" onclick="cleanupDo('done')"><span class="oi">✅</span><span class="ob">完了した</span></button>
    <button class="opt" onclick="cleanupDo('none')"><span class="oi">🗑</span><span class="ob">対応不要</span></button>`);
}
function cleanupDo(act){
  const t=cleanupQueue[cleanupIdx]; t.updated=TODAY.toISOString();
  if(act==='keep'){t.status='now';if(!t.next)t.next='最初の一手を決める';}
  else if(act==='wait'){t.ball='other';t.status='wait';t.nextCheck=dPlus(3);}
  else if(act==='hold')t.status='hold'; else if(act==='done')t.status='done';
  else if(act==='none'){t.status='archived';t.noNeed=true;}
  cleanupIdx++; save(); showCleanup();
}

function itemEmoji(it){ return evEmoji(it.kind==='task'?it.task.title:it.ev); }
/* 予定の色＝内容からワークスペースを推定して事業カラーに（Google/端末の区別はしない） */
function evWsColor(title){ try{ return wsColor(detectWS(title||'')); }catch(e){ return '#8a8f98'; } }
function dayItems(d){
  const key=dayKey(d); const items=[];
  (DB.schedule||[]).forEach((s,i)=>{ if(s.date===key)items.push({kind:'ev',t:s.t,st:s.t,ev:s.ev,idx:i}); });
  (DB.gcal||[]).forEach(g=>{ if(g.date===key)items.push({kind:'g',t:g.t,st:g.t==='終日'?'00:01':g.t,ev:g.ev}); });
  activeTasks().forEach(t=>{ if(t.due&&dayKey(new Date(t.due))===key){
    const dd=new Date(t.due); const hm=`${p2(dd.getHours())}:${p2(dd.getMinutes())}`;
    items.push({kind:'task',t:t.dueLabel?'目安':hm,st:t.dueLabel?'23:58':hm,task:t}); } });
  items.sort((a,b)=>a.st.localeCompare(b.st));
  return items;
}
function renderCal(){
  syncToday();
  if(!calYM){ calYM=new Date(TODAY.getFullYear(),TODAY.getMonth(),1); calSelected=new Date(TODAY); }
  const mB=$('#cmM'),wB=$('#cmW'); if(mB){mB.classList.toggle('on',calMode==='month');wB.classList.toggle('on',calMode==='week');}
  $('#gsyncBtn').style.display=gcalConfigured()?'':'none';
  $('#calGrid').classList.add('as-list');   // 月＝手帳式の週ブロック積み、週＝アジェンダ。どちらもブロック配置
  if(calMode==='week'){ $('#calWd').style.display='none'; $('#calPeek').style.display='none'; renderWeek(); renderCalDay(); return; }
  $('#calWd').style.display=''; $('#calPeek').style.display='';
  $('#calTitle').textContent=`${calYM.getFullYear()}年 ${calYM.getMonth()+1}月`;
  // ビジネス手帳式：週=月〜金の広い5マス＋土日の横長帯
  const y=calYM.getFullYear(), mo=calYM.getMonth();
  const first=new Date(y,mo,1), last=new Date(y,mo+1,0);
  const start=new Date(first); start.setDate(first.getDate()-((first.getDay()+6)%7));  // 週の頭＝月曜
  let html=''; const dayStats=[];
  const chip=it=>{
    if(it.kind==='task'){ const c=wsColor(it.task.ws);
      return `<span class="cal-it" style="border-color:${c};background:${c}1f;color:#2c3340">${itemEmoji(it)} ${esc(it.task.title)}</span>`; }
    const c=evWsColor(it.ev);
    return `<span class="cal-it" style="border-color:${c};background:${c}1f;color:#2c3340">${itemEmoji(it)} ${esc(it.ev)}</span>`;};
  for(let ws=new Date(start); ws<=last; ws.setDate(ws.getDate()+7)){
    let wd='', we='';
    for(let i=0;i<7;i++){
      const dt=new Date(ws); dt.setDate(ws.getDate()+i);
      const inM=dt.getMonth()===mo, isWe=i>=5;
      if(!inM){ if(isWe)we+='<div class="wehalf blank"></div>'; else wd+='<div class="mcell blank"></div>'; continue; }
      const items=dayItems(dt);
      dayStats.push({d:dt.getDate(),n:items.length,over:items.some(it=>it.kind==='task'&&isOverdue(it.task.due)&&!it.task.dueLabel),fut:dt>=startOfDay(TODAY)});
      const isToday=dayKey(dt)===dayKey(TODAY), isSel=calSelected&&dayKey(dt)===dayKey(calSelected);
      const st=`${isToday?'today':''} ${isSel?'sel':''} ${(dt<startOfDay(TODAY)&&!isToday)?'past':''}`;
      if(isWe){
        we+=`<button class="wehalf ${i===5?'sat':'sun'} ${st}" onclick="calPick('${dt.toISOString()}')">
          <span class="wed">${dt.getDate()}(${WD[dt.getDay()]})</span>
          ${items[0]?chip(items[0]):''}${items.length>1?`<span class="cal-more">+${items.length-1}</span>`:''}</button>`;
      }else{
        wd+=`<button class="mcell ${st}" onclick="calPick('${dt.toISOString()}')">
          <span class="d">${dt.getDate()}</span>
          ${items.slice(0,2).map(chip).join('')}
          ${items.length>2?`<span class="cal-more">+${items.length-2}件</span>`:''}</button>`;
      }
    }
    html+=`<div class="mweek"><div class="mwd-row">${wd}</div><div class="mwe-row">${we}</div></div>`;
  }
  $('#calGrid').innerHTML=html;
  // 今月の山場（忙しい日トップ2を予報）
  const peaks=dayStats.filter(c=>c.fut&&(c.n>=5||(c.over&&c.n>=2))).sort((a,b)=>(b.over?10:0)+b.n-((a.over?10:0)+a.n)).slice(0,2);
  $('#calPeek').innerHTML=peaks.length
    ?`⚡ 山場：${peaks.map(p=>`${calYM.getMonth()+1}/${p.d}（${p.n}件${p.over?'・期限すぎあり':''}）`).join('・')}`
    :`この月はおだやかです 🌤`;
  renderCalDay();
}
function renderWeek(){
  const base=new Date(calSelected||TODAY);
  const start=new Date(base); start.setDate(base.getDate()-base.getDay()); start.setHours(0,0,0,0);
  const end=new Date(start); end.setDate(start.getDate()+6);

      ${items.length?items.map(it=>{
        if(it.kind==='task'){const t=it.task;const c=wsColor(t.ws);return `<div class="wk-it" style="border-color:${c};background:${c}14" onclick="taskActionSheet('${t.id}')"><span class="wk-tm">${it.t}</span><span class="wk-tx">${esc(t.title)}${t.dueLabel?'（'+esc(t.dueLabel)+'）':''}</span></div>`;}

function renderCalDay(){

/* =====================================================================
   Googleカレンダー連携（読み取り＋予定追加）
   ===================================================================== */
let gToken=null,gTokenExp=0,gTokenClient=null,gAuthCb=null,gClientUsed=null;
function gcalConfigured(){ return !!(DB.settings.gcalClientId); }
function gcalConnected(){ return gcalConfigured()&&!!DB.settings.gcalOn; }
function loadGIS(cb){
  if(window.google&&google.accounts&&google.accounts.oauth2){cb(true);return;}
  const s=document.createElement('script'); s.src='https://accounts.google.com/gsi/client';
  s.onload=()=>cb(true); s.onerror=()=>cb(false);
  document.head.appendChild(s);
}
function gcalAuth(interactive,cb){
  if(gToken&&Date.now()<gTokenExp){cb(true);return;}
  if(!interactive&&!DB.settings.gcalOn){cb(false);return;}
  loadGIS(ok=>{
    if(!ok){cb(false);return;}
    gAuthCb=cb;
    if(gTokenClient&&gClientUsed!==DB.settings.gcalClientId){ gTokenClient=null; gToken=null; }  // IDが変わったら接続部品を作り直す（重要バグ修正）
    if(!gTokenClient){
      try{
        gClientUsed=DB.settings.gcalClientId;
        gTokenClient=google.accounts.oauth2.initTokenClient({
          client_id:DB.settings.gcalClientId,
          scope:'https://www.googleapis.com/auth/calendar.events',
          callback:(resp)=>{ const f=gAuthCb; gAuthCb=null;
            if(resp&&resp.access_token){ gToken=resp.access_token; gTokenExp=Date.now()+((resp.expires_in||3600)-60)*1000; if(f)f(true); }
            else if(f)f(false); },
          error_callback:()=>{ const f=gAuthCb; gAuthCb=null; if(f)f(false); }
        });
      }catch(e){ gAuthCb=null; cb(false); return; }
    }
    try{ gTokenClient.requestAccessToken({prompt:''}); }catch(e){ const f=gAuthCb; gAuthCb=null; if(f)f(false); }
  });
}
function gcalSync(manual){
  if(!gcalConfigured()){ if(manual)openGcalHelp(); return; }
  gcalAuth(manual,ok=>{
    if(!ok){ if(manual)toast('Google認証できませんでした'); return; }
    DB.settings.gcalOn=true;
    const min=new Date(TODAY.getFullYear(),TODAY.getMonth()-1,1).toISOString();
    const max=new Date(TODAY.getFullYear(),TODAY.getMonth()+3,1).toISOString();
    fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events?singleEvents=true&orderBy=startTime&maxResults=250&timeMin='+encodeURIComponent(min)+'&timeMax='+encodeURIComponent(max),
      {headers:{Authorization:'Bearer '+gToken}})
    .then(r=>{ if(!r.ok)throw new Error('HTTP '+r.status); return r.json(); })
    .then(j=>{
      DB.gcal=(j.items||[]).filter(e=>e.status!=='cancelled'&&e.start).map(e=>{
        const allday=!e.start.dateTime;
        const d=new Date(e.start.dateTime||(e.start.date+'T00:00'));
        return {date:dayKey(d),t:allday?'終日':`${p2(d.getHours())}:${p2(d.getMinutes())}`,ev:e.summary||'(無題)'};
      });
      DB.gcalSyncAt=Date.now(); save();
      if(manual)toast('Google同期完了：'+DB.gcal.length+'件');
      refreshCal();
    })
    .catch(e=>{ if(manual)toast('同期失敗：'+e.message); });
  });
}
function gcalInsert(dateObj,timeHHMM,title,cb){
  gcalAuth(true,ok=>{
    if(!ok){cb(false);return;}
    const hm=(timeHHMM||'09:00').split(':');
    const st=new Date(dateObj); st.setHours(+hm[0]||9,+hm[1]||0,0,0);
    const en=new Date(st.getTime()+3600000);
    fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events',{method:'POST',
      headers:{Authorization:'Bearer '+gToken,'Content-Type':'application/json'},
      body:JSON.stringify({summary:title,start:{dateTime:st.toISOString()},end:{dateTime:en.toISOString()}})})
    .then(r=>{ if(!r.ok)throw 0; return r.json(); })
    .then(()=>{ cb(true); gcalSync(false); })
    .catch(()=>cb(false));
  });
}
function gcalConnect(){
  const inp=$('#gcalIdInput');
  const v=inp?(inp.value||'').replace(/\s+/g,''):'';   // 改行・空白の混入を除去（コピペ対策）
  if(v)DB.settings.gcalClientId=v;
  if(!DB.settings.gcalClientId){toast('クライアントIDを入力してください');return;}
  save();
  gTokenClient=null; gToken=null;                       // 接続時は必ず今のIDで作り直す（重要バグ修正）
  gcalAuth(true,ok=>{ if(ok){ DB.settings.gcalOn=true; save(); openSettings(); toast('Google連携しました'); gcalSync(true); }
    else toast('Google認証できませんでした（使用ID: '+(DB.settings.gcalClientId||'').slice(0,14)+'…）'); });
}
function gcalDisconnect(){ DB.settings.gcalOn=false; gToken=null; DB.gcal=[]; save(); openSettings(); toast('Google連携を解除しました'); }

function saveRenameWorkspace(i){
  const w=DB.workspaces[i]; const v=($('#wsRename').value||'').trim(); if(!v){toast('名前を入力してください');return;}
  const old=w.name; w.name=v;

  save(); openWorkspaces(); toast('改名しました');

function deleteWorkspace(i){
  const w=DB.workspaces[i]; if(!w||w.name==='未分類')return;
  const used=DB.tasks.filter(t=>t.ws===w.name).length+DB.projects.filter(p=>p.ws===w.name).length;
  DB.tasks.forEach(t=>{ if(t.ws===w.name)t.ws='未分類'; }); DB.projects.forEach(p=>{ if(p.ws===w.name)p.ws='未分類'; });
  DB.workspaces.splice(i,1); save(); openWorkspaces(); toast(used?`削除（${used}件は未分類へ）`:'削除しました');
}

    <div class="edit-fld"><textarea id="ob_ws" style="min-height:120px" placeholder="例：&#10;株式会社○○&#10;副業（物販）&#10;○○店&#10;家庭"></textarea></div>
    <div class="set-row"><div><div class="sl">通知の強さ</div></div><div class="segbtns" id="ob_str">
      ${[['min','最小限'],['std','標準'],['strong','しっかり']].map(o=>`<button class="${o[0]==='std'?'on':''}" data-v="${o[0]}" onclick="document.querySelectorAll('#ob_str button').forEach(b=>b.classList.remove('on'));this.classList.add('on')">${o[1]}</button>`).join('')}</div></div>
    <div class="sheet-acts"><button class="ed" onclick="openOnboarding()">戻る</button><button class="ok" onclick="finishCustom()">この内容で始める</button></div>`);
  setTimeout(()=>$('#ob_ws')&&$('#ob_ws').focus(),200);
}
function finishCustom(){
  const names=($('#ob_ws').value||'').split('\n').map(x=>x.trim()).filter(Boolean);
  const list=(names.length?names:['仕事','プライベート']);
  DB.workspaces=list.map((n,i)=>({name:n,color:PALETTE[i%PALETTE.length]}));
  DB.workspaces.push({name:'未分類',color:'#8a8f98'});
  const str=(document.querySelector('#ob_str button.on')||{}).dataset; DB.settings.strength=(str&&str.v)||'std';
  DB.onboarded=true; mode='normal'; save(); onboarding=false; afterOnboard();
  toast('準備できました。最初の仕事を話してみてください');
  setTimeout(()=>openDepositSheet(false),400);
}
function afterOnboard(){ const m=MODES[mode]; $('#modeChip').className='mode-chip '+m.cls; $('#modeLabel').textContent=m.label; closeSheetForce(); postInit(); }

/* =====================================================================
   写真添付（端末内に縮小保存）
   ===================================================================== */
let pendingPhoto=null;
function photoStub(){ const inp=$('#photoInput'); if(inp){ inp.dataset.target='deposit'; inp.click(); } }
function onPhotoPick(ev){
  const f=ev.target.files&&ev.target.files[0]; const target=ev.target.dataset.target; ev.target.value='';
  if(!f)return;
  downscale(f,640,0.6,dataUrl=>{
    if(target==='deposit'){ pendingPhoto=dataUrl; $('#depPhoto').innerHTML=`<img src="${dataUrl}" style="max-height:90px;border-radius:10px;margin-top:10px"><div style="font-size:12px;color:var(--muted);margin-top:4px">📎 写真を添付（登録時にひも付け）<button onclick="clearDepPhoto()" style="color:var(--red);font-weight:700;margin-left:8px">外す</button></div>`; toast('写真を添付しました'); }
    else if(target&&target.startsWith('task:')){ const t=DB.tasks.find(x=>x.id===target.slice(5)); if(t){ t.photo=dataUrl; t.updated=TODAY.toISOString(); save(); openEdit(t.id); toast('写真を更新しました'); } }
  });
}
function clearDepPhoto(){ pendingPhoto=null; $('#depPhoto').innerHTML=''; }
function downscale(file,max,q,cb){
  const r=new FileReader(); r.onload=()=>{ const img=new Image(); img.onload=()=>{
    let{width:w,height:h}=img; if(w>h&&w>max){h=h*max/w;w=max;} else if(h>=w&&h>max){w=w*max/h;h=max;}
    const c=document.createElement('canvas'); c.width=w; c.height=h; c.getContext('2d').drawImage(img,0,0,w,h);
    try{ cb(c.toDataURL('image/jpeg',q)); }catch(e){ toast('写真を変換できませんでした'); }
  }; img.onerror=()=>toast('画像を読めませんでした'); img.src=r.result; };
  r.readAsDataURL(file);
}
function attachTaskPhoto(id){ const inp=$('#photoInput'); if(inp){ inp.dataset.target='task:'+id; inp.click(); } }
function removeTaskPhoto(id){ const t=DB.tasks.find(x=>x.id===id); if(t){ delete t.photo; t.updated=TODAY.toISOString(); save(); openEdit(id); } }

/* =====================================================================
   SHEET / INIT
   ===================================================================== */
function openSheet(html){ $('#sheet').innerHTML=`<div class="grab"></div>`+html; $('#scrim').classList.add('on'); document.body.style.overflow='hidden'; }
function closeSheet(){ if(onboarding)return; $('#scrim').classList.remove('on'); document.body.style.overflow=''; }
function closeSheetForce(){ $('#scrim').classList.remove('on'); document.body.style.overflow=''; }

let appTimer=null;
function startAppTimers(){ if(appTimer)clearInterval(appTimer); appTimer=setInterval(()=>{ syncToday(); nightReviewCheck(); alarmTick(); },60000); alarmTick(); }
function postInit(){
  renderHome(); reentryCheck(); nightReviewCheck(); startAppTimers();
  if(DB.settings.notify&&typeof Notification!=='undefined'&&Notification.permission==='granted')startNotifyLoop();
}
function init(){
  const m=MODES[mode]; $('#modeChip').className='mode-chip '+m.cls; $('#modeLabel').textContent=m.label;
  document.addEventListener('visibilitychange',()=>{ if(!document.hidden){syncToday();if(curView==='home')renderHome();nightReviewCheck();alarmTick();} });
  if(!DB.onboarded){ openOnboarding(); return; }     // 新規利用者は初回設定へ
  postInit();
}
init();
window.go=go;
</script>
</body>
